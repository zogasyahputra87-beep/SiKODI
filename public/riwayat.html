<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Riwayat Konsultasi | SiCODI Inspektorat Kabupaten Malang</title>
    <meta name="description" content="Lihat riwayat dan pantau alur tindak lanjut konsultasi digital Anda di Inspektorat Daerah Kabupaten Malang.">

    <link rel="icon" type="image/png" href="../pages/logo_kab.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1F2937">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        body {
            user-select: none;
            -webkit-user-select: none;
            display: none; 
        }

        .spin { animation: rotate 0.8s linear; }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .profile-ring {
            padding: 2px;
            background: linear-gradient(to bottom right, #3b82f6, #1e40af);
        }

        /* Timeline & Preview */
        .timeline-step { position: relative; padding-left: 1.5rem; margin-bottom: 0.75rem; border-left: 2px solid #e5e7eb; }
        .timeline-step::before { content: ''; position: absolute; left: -0.45rem; top: 0.25rem; width: 0.8rem; height: 0.8rem; border-radius: 50%; background: #cbd5e1; border: 2px solid #fff; }
        .timeline-active::before { background: #3b82f6; }
        .timeline-success::before { background: #10b981; }
        .timeline-error::before { background: #ef4444; }
        .preview-container { width: 100%; height: 250px; border-radius: 12px; overflow: hidden; border: 1px solid #e5e7eb; margin-top: 0.5rem; background: #f9fafb; }
        .preview-iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 overflow-hidden">

    <div class="flex h-screen overflow-hidden relative">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-[#1F2937] text-gray-300 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col shadow-2xl md:shadow-none">
            <div class="p-6 border-b border-gray-700 flex flex-col items-center">
                <img src="../pages/logo_kab.png" alt="Logo" class="w-14 mb-3">
                <div class="text-center">
                    <h1 class="text-xl font-bold text-white tracking-tight">SiCODI</h1>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest leading-tight">Inspektorat Daerah<br>Kabupaten Malang</p>
                </div>
            </div>
            
            <nav class="flex-1 mt-6 px-4 space-y-1">
                <a href="index.html" class="w-full flex items-center p-3 rounded-lg hover:bg-gray-800 transition text-sm"><span class="mr-3">📊</span> Dashboard</a>
                <a href="buat-konsultasi.html" class="w-full flex items-center p-3 rounded-lg hover:bg-gray-800 transition text-sm"><span class="mr-3">➕</span> Buat Konsultasi</a>
                <a href="riwayat.html" class="bg-gray-700 text-white w-full flex items-center p-3 rounded-lg text-sm font-bold border-r-4 border-blue-500"><span class="mr-3">📂</span> Riwayat Konsultasi</a>
            </nav>

            <div class="p-6 border-t border-gray-700 flex flex-col items-center bg-gray-800/50">
                <div class="w-16 h-16 rounded-full profile-ring shadow-lg mb-3 overflow-hidden">
                    <img src="../pages/zoga.jpg" alt="Zoga" onerror="this.src='https://ui-avatars.com/api/?name=Zoga'" class="w-full h-full object-cover">
                </div>
                <p class="text-[11px] font-bold text-gray-100 uppercase">Ananda Zoga Syahputra, S.Tr.I.P.</p>
                <button onclick="logout()" class="mt-4 w-full px-4 py-2 text-[10px] font-bold uppercase text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg hover:bg-red-500/20 transition">Keluar Sistem</button>
            </div>
        </aside>

        <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

        <main class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white border-b border-gray-200 p-4 flex justify-between items-center px-8 h-20 flex-shrink-0 sticky top-0 z-30">
                <div class="flex items-center">
                    <button onclick="toggleSidebar()" class="md:hidden mr-4 p-2 bg-gray-100 rounded-lg">
                        <svg class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                    </button>
                    <h2 class="text-sm md:text-lg font-black text-gray-800 uppercase tracking-widest">Riwayat Konsultasi</h2>
                </div>
                
                <div class="flex items-center space-x-3">
                    <button onclick="refreshData()" class="flex items-center space-x-2 bg-gray-50 hover:bg-gray-100 text-gray-600 px-4 py-2 rounded-xl border border-gray-200 transition active:scale-95 shadow-sm">
                        <span id="refresh-icon">🔄</span>
                        <span class="hidden md:inline text-[10px] font-bold uppercase tracking-widest font-black">Refresh Data</span>
                    </button>
                    <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center border text-xl shadow-inner">👤</div>
                </div>
            </header>

            <div class="p-6 md:p-10">
                <div class="mb-6 max-w-2xl">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest">Pencarian Data</label>
                    <div class="relative group">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">🔍</span>
                        <input type="text" id="searchInput" onkeyup="filterRiwayat()" placeholder="Ketik Nama OPD atau Judul Masalah..." class="block w-full pl-11 pr-4 py-3.5 border border-gray-200 rounded-2xl bg-white text-xs placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 transition shadow-sm group-hover:border-gray-300">
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="overflow-x-auto custom-scrollbar">
                        <table class="w-full text-left border-collapse min-w-[850px]">
                            <thead class="bg-gray-50 border-b border-gray-100">
                                <tr class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">
                                    <th class="p-5 col-waktu">Waktu</th>
                                    <th class="p-5 w-48">Instansi / Metode</th>
                                    <th class="p-5">Detail Konsultasi & Alur Monitoring</th>
                                    <th class="p-5 text-center w-32">Status</th>
                                </tr>
                            </thead>
                            <tbody id="listTable" class="divide-y divide-gray-50"></tbody>
                        </table>
                    </div>
                    <div id="loader" class="p-10 text-center text-gray-400 italic text-sm">Menghubungkan ke server...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let rawRiwayat = []; 

        (function() {
            if (sessionStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'login.html';
            } else {
                document.body.style.display = "block";
            }
        })();

        document.addEventListener('contextmenu', e => e.preventDefault());

        const API_URL = "https://script.google.com/macros/s/AKfycbxI7CDn0iJ48mX2NcNosdCAH-P1LZESQN76wKgTrqgcly-BvYxwaQbaAj65bEyidfqZ/exec";

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        async function refreshData() {
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('spin');
            await loadData();
            setTimeout(() => icon.classList.remove('spin'), 800);
        }

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                rawRiwayat = await res.json();
                renderRiwayat(rawRiwayat);
            } catch (e) {
                document.getElementById('loader').innerText = "⚠️ Gagal memuat data.";
            }
        }

        function renderRiwayat(dataToRender) {
            const listTable = document.getElementById('listTable');
            const loader = document.getElementById('loader');
            
            if (!dataToRender || dataToRender.length === 0) {
                listTable.innerHTML = "";
                loader.classList.remove('hidden');
                loader.innerText = "Data tidak ditemukan.";
                return;
            }
            loader.classList.add('hidden');
            
            listTable.innerHTML = [...dataToRender].reverse().map(item => {
                const isTerjawab = item.status === 'Terjawab' || item.status === 'Selesai';
                const isPending = item.status === 'Menunggu';
                
                const metodeBadge = item.metode === 'Offline' 
                    ? `<div class="mt-2 inline-flex flex-col space-y-1">
                         <span class="bg-purple-100 text-purple-700 px-2 py-0.5 rounded text-[8px] font-black uppercase border border-purple-200">Offline</span>
                         <span class="text-[9px] text-purple-600 font-bold italic">📅 ${item.tgl_offline || '-'}</span>
                       </div>`
                    : `<div class="mt-2"><span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-[8px] font-black uppercase border border-blue-200">Online</span></div>`;

                // Preview Logics (Lampiran & TL)
                let previewTL = "";
                const regexLink = /Link Dokumen: (https?:\/\/[^\s]+)/;
                const match = item.bukti_tl ? item.bukti_tl.match(regexLink) : null;
                if (match && match[1]) {
                    const previewUrl = match[1].replace('/view?usp=drivesdk', '/preview').replace('/view', '/preview');
                    previewTL = `<div class="preview-container"><iframe src="${previewUrl}" class="preview-iframe"></iframe></div>`;
                }

                let previewAjuan = "";
                if (item.lampiran && item.lampiran.includes('drive.google.com')) {
                    const previewAjuanUrl = item.lampiran.replace('/view?usp=drivesdk', '/preview').replace('/view', '/preview');
                    previewAjuan = `<div class="preview-container"><iframe src="${previewAjuanUrl}" class="preview-iframe"></iframe></div>`;
                }

                let timelineContent = `
                    <div class="timeline-step timeline-success">
                        <p class="text-[9px] font-bold text-gray-400 uppercase">Tahap 1: Pengajuan & Tanggapan</p>
                        <div class="text-xs text-gray-700 mt-1">
                            <p class="font-bold mb-1">Masalah:</p>
                            <p class="italic bg-white p-2 rounded border border-gray-100 mb-2">"${item.issue || '-'}"</p>
                            ${previewAjuan}
                            <hr class="my-2 border-gray-200">
                            <p class="font-bold mb-1 text-green-700">Tanggapan Auditor:</p>
                            <p class="italic">${isTerjawab ? `"${item.jawaban}" <br><span class="text-[10px] text-gray-400">Dijawab: ${item.waktu_jawaban}</span>` : 'Menunggu tanggapan...'}</p>
                        </div>
                    </div>
                `;

                if(isTerjawab) {
                    let tlStatusText = "";
                    let tlClass = "timeline-active";
                    if(item.status_tl === "Belum TL") tlStatusText = "Menunggu OPD mengirimkan bukti tindak lanjut.";
                    else if(item.status_tl === "Menunggu Verifikasi") tlStatusText = `<span class="text-orange-600 font-medium">Bukti terkirim pada ${item.waktu_tl}</span><br>Penjelasan: "${item.bukti_tl.split('|')[0]}" ${previewTL}`;
                    else if(item.status_tl === "Perlu Perbaikan") { tlStatusText = `<span class="text-red-600 font-medium font-bold">⚠️ Perlu Perbaikan:</span> ${item.catatan_admin_tl} <br> ${previewTL}`; tlClass = "timeline-error"; }
                    else if(item.status_tl === "Tuntas") { tlStatusText = `<span class="text-teal-600 font-medium font-bold">✅ Sesuai (Tuntas):</span> Diverifikasi pada ${item.waktu_verifikasi}. <br><span class="italic text-gray-500">Catatan Auditor: ${item.catatan_admin_tl}</span> ${previewTL}`; tlClass = "timeline-success"; }
                    timelineContent += `<div class="timeline-step ${tlClass}"><p class="text-[9px] font-bold text-gray-400 uppercase">Tahap 2: Monitoring Tindak Lanjut</p><div class="text-xs text-gray-700 mt-1">${tlStatusText}</div></div>`;
                }

                let actionBtn = (isTerjawab && (item.status_tl === "Belum TL" || item.status_tl === "Perlu Perbaikan")) 
                    ? `<button onclick="formTL(${item.id})" class="mt-2 w-full py-2 bg-blue-600 text-white rounded-lg text-[10px] font-bold uppercase hover:bg-blue-700 transition shadow-sm animate__animated animate__pulse animate__infinite">Kirim Laporan & Bukti TL</button>` : "";

                return `<tr class="hover:bg-gray-50/50 transition border-b border-gray-50">
                    <td class="p-5 text-[9px] text-gray-400 align-top pt-6 col-waktu">${item.waktu}</td>
                    <td class="p-5 font-bold text-sm text-gray-700 align-top pt-6">${item.opd}${metodeBadge}</td>
                    <td class="p-5 align-top pt-6">
                        <div class="text-sm font-bold text-gray-800">${item.judul}</div>
                        <div class="text-[10px] text-blue-500 font-semibold italic mb-4 uppercase">${item.kategori}</div>
                        <div class="mb-4 bg-gray-50/50 p-4 rounded-xl border border-gray-100">${timelineContent}</div>
                        <div class="flex space-x-2">
                            ${item.lampiran && item.lampiran !== '-' ? `<a href="${item.lampiran}" target="_blank" class="px-3 py-1.5 bg-gray-100 text-gray-600 border border-gray-200 rounded-lg text-[9px] font-bold uppercase tracking-wider">📂 Buka Lampiran</a>` : ''}
                        </div>${actionBtn}
                    </td>
                    <td class="p-5 text-center align-top pt-6">
                        <span class="inline-block w-24 py-1.5 ${item.status_tl === 'Tuntas' ? 'bg-teal-100 text-teal-700 border-teal-200' : (isTerjawab ? 'bg-green-100 text-green-700 border-green-200' : 'bg-yellow-100 text-yellow-700 border-yellow-200')} text-[9px] font-bold rounded-full uppercase border">
                            ${item.status_tl === 'Tuntas' ? 'Tuntas' : item.status}
                        </span>
                    </td>
                </tr>`;
            }).join('');
        }

        function filterRiwayat() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = rawRiwayat.filter(item => 
                item.opd.toLowerCase().includes(query) || 
                item.judul.toLowerCase().includes(query)
            );
            renderRiwayat(filtered);
        }

        async function formTL(rowId) {
            const { value: formValues } = await Swal.fire({
                title: 'Laporan Tindak Lanjut',
                html: '<div class="text-left"><label class="text-[10px] font-bold text-gray-400 uppercase">Penjelasan</label><textarea id="swal-input-ket" class="w-full p-2 border rounded-lg text-xs mb-3 outline-none" rows="3"></textarea><input type="file" id="swal-input-file" class="w-full text-xs" accept=".pdf,image/*"></div>',
                showCancelButton: true,
                preConfirm: () => {
                    const penjelasan = document.getElementById('swal-input-ket').value;
                    if (!penjelasan.trim()) { Swal.showValidationMessage('Wajib diisi!'); return false; }
                    return { penjelasan: penjelasan, file: document.getElementById('swal-input-file').files[0] || null };
                }
            });
            if (formValues) {
                Swal.fire({ title: 'Mengirim...', didOpen: () => Swal.showLoading() });
                if (formValues.file) {
                    const reader = new FileReader();
                    reader.onload = async (e) => await kirimDataTL(rowId, formValues.penjelasan, e.target.result.split(',')[1], formValues.file.name, formValues.file.type);
                    reader.readAsDataURL(formValues.file);
                } else await kirimDataTL(rowId, formValues.penjelasan, "", "", "");
            }
        }

        async function kirimDataTL(rowId, penjelasan, fileData, fileName, fileType) {
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "kirim_tindak_lanjut", row: rowId, penjelasan: penjelasan, fileData: fileData, fileName: fileName, fileType: fileType }) });
                Swal.fire({ icon: 'success', title: 'Terkirim!', timer: 1500 });
                refreshData();
            } catch (e) { Swal.fire('Gagal', 'Sistem error.', 'error'); }
        }

        window.onload = loadData;
        function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }
    </script>
</body>
</html>
