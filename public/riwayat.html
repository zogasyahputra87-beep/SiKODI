<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Konsultasi | E-Consulting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animasi halus untuk membuka jawaban */
        details[open] summary ~ * {
            animation: sweep .3s ease-in-out;
        }
        @keyframes sweep {
            0%    {opacity: 0; margin-top: -10px}
            100%  {opacity: 1; margin-top: 0px}
        }
        /* Membatasi lebar kolom waktu agar lebih hemat ruang */
        .col-waktu { width: 90px; min-width: 90px; }
        
        /* Animasi putar untuk tombol refresh */
        .spin {
            animation: rotate 0.8s linear;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-72 bg-[#1F2937] text-gray-300 flex-shrink-0 hidden md:flex flex-col">
            <div class="p-8 border-b border-gray-700">
                <h1 class="text-xl font-bold text-white tracking-tighter">SiCODI</h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest leading-tight">Inspektorat Kab. Malang</p>
            </div>
            <nav class="flex-1 mt-6 px-4 space-y-1">
                <a href="index.html" class="flex p-3 rounded-lg hover:bg-gray-800 text-sm">Dashboard</a>
                <a href="buat-konsultasi.html" class="flex p-3 rounded-lg hover:bg-gray-800 text-sm">Buat Konsultasi</a>
                <a href="riwayat.html" class="bg-gray-700 text-white flex p-3 rounded-lg text-sm font-bold border-r-4 border-blue-500">Riwayat Konsultasi</a>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white border-b p-4 px-8 h-20 flex justify-between items-center shadow-sm">
                <h2 class="font-bold text-gray-800 uppercase tracking-wide">Daftar Riwayat Konsultasi</h2>
                
                <div class="flex items-center space-x-4">
                    <button onclick="refreshData(this)" class="flex items-center space-x-2 bg-gray-50 hover:bg-gray-100 text-gray-600 px-4 py-2 rounded-xl border border-gray-200 transition active:scale-95 shadow-sm">
                        <span id="refresh-icon">🔄</span>
                        <span class="text-[10px] font-bold uppercase tracking-widest">Update Data</span>
                    </button>
                    
                    <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-xl shadow-inner border border-gray-200">👤</div>
                </div>
            </header>

            <div class="p-8">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                    <table class="w-full text-left border-collapse table-fixed">
                        <thead class="bg-gray-50 border-b border-gray-100">
                            <tr class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">
                                <th class="p-5 col-waktu">Waktu</th>
                                <th class="p-5 w-48 text-center md:text-left">Instansi</th>
                                <th class="p-5">Detail Konsultasi & Jawaban</th>
                                <th class="p-5 text-center w-32">Status</th>
                            </tr>
                        </thead>
                        <tbody id="listTable" class="divide-y divide-gray-50"></tbody>
                    </table>
                    <div id="loader" class="p-10 text-center text-gray-400 italic text-sm">Menghubungkan ke server Inspektorat...</div>
                </div>
                <p class="mt-4 text-[10px] text-gray-400 italic">* Klik "LIHAT DETAIL KONSULTASI" untuk membaca rincian masalah dan jawaban resmi.</p>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx1CfegHxZP-ULmj_UTCXluojx1j5KFyX_1Js-T4Z4ID1q2CC0OitrlubOaRqu8zqpT/exec";

        // Fungsi pembungkus untuk tombol refresh agar ada animasi
        async function refreshData(btn) {
            const icon = document.getElementById('refresh-icon');
            const loader = document.getElementById('loader');
            
            // Tambahkan animasi & tampilkan loader
            icon.classList.add('spin');
            loader.classList.remove('hidden');
            loader.innerText = "Memperbarui data...";
            
            await loadData();
            
            // Hapus animasi setelah 1 detik
            setTimeout(() => {
                icon.classList.remove('spin');
            }, 800);
        }

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                const listTable = document.getElementById('listTable');
                const loader = document.getElementById('loader');
                
                if (data.length === 0) {
                    loader.innerText = "Belum ada riwayat konsultasi yang tersimpan.";
                    loader.classList.remove('hidden');
                    listTable.innerHTML = "";
                    return;
                }

                loader.classList.add('hidden');
                
                listTable.innerHTML = data.reverse().map(item => {
                    const rincian = item.issue && item.issue !== "-" ? item.issue : "Rincian masalah tidak dicantumkan.";
                    const tanggapan = item.jawaban && item.jawaban !== "" ? item.jawaban : "Tanggapan resmi belum tersedia.";
                    const tglJawab = item.waktu_jawaban && item.waktu_jawaban !== "-" ? item.waktu_jawaban : "Menunggu antrean";

                    return `
                    <tr class="hover:bg-gray-50/50 transition">
                        <td class="p-5 text-[9px] text-gray-400 align-top pt-6 leading-tight break-words col-waktu">${item.waktu}</td>
                        <td class="p-5 font-bold text-sm text-gray-700 align-top pt-6">${item.opd}</td>
                        <td class="p-5 align-top pt-6">
                            <div class="text-sm font-bold text-gray-800">${item.judul}</div>
                            <div class="text-[10px] text-gray-400 uppercase font-semibold italic mb-3">${item.kategori}</div>
                            
                            <details class="group border border-gray-200 rounded-lg bg-white overflow-hidden shadow-sm">
                                <summary class="list-none p-2 text-[10px] font-bold text-gray-600 cursor-pointer flex items-center hover:bg-gray-50 transition uppercase tracking-tighter">
                                    <span class="mr-2 group-open:rotate-90 transition-transform text-[8px]">▶</span> 
                                    Lihat Detail Konsultasi
                                </summary>
                                <div class="p-4 space-y-4 border-t border-gray-100 bg-gray-50/30">
                                    <div class="bg-white p-3 rounded-lg border border-gray-200 shadow-sm">
                                        <p class="text-[9px] font-bold
