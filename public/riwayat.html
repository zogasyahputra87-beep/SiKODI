<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat | SiCODI Inspektorat</title>
    
    <link rel="icon" type="image/png" href="../pages/logo_kab.png">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        body {
            user-select: none;
            -webkit-user-select: none;
            display: none; 
        }

        details[open] summary ~ * {
            animation: sweep .3s ease-in-out;
        }
        @keyframes sweep {
            0%    {opacity: 0; margin-top: -10px}
            100%  {opacity: 1; margin-top: 0px}
        }
        
        .col-waktu { width: 90px; min-width: 90px; }
        
        .spin { animation: rotate 0.8s linear; }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .profile-ring {
            padding: 2px;
            background: linear-gradient(to bottom right, #3b82f6, #1e40af);
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 overflow-hidden">

    <div class="flex h-screen overflow-hidden relative">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-[#1F2937] text-gray-300 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col shadow-2xl md:shadow-none">
            
            <div class="p-6 border-b border-gray-700 flex flex-col items-center">
                <img src="../pages/logo_kab.png" alt="Logo Kab Malang" class="w-14 mb-3 drop-shadow-md">
                <div class="text-center">
                    <h1 class="text-xl font-bold text-white tracking-tight">SiCODI</h1>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest leading-tight text-center">Inspektorat Daerah<br>Kabupaten Malang</p>
                </div>
                <button onclick="toggleSidebar()" class="md:hidden absolute top-4 right-4 text-gray-400">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            
            <nav class="flex-1 mt-6 px-4 space-y-1">
                <a href="index.html" class="w-full flex items-center p-3 rounded-lg hover:bg-gray-800 transition text-sm">
                    <span class="mr-3">📊</span> Dashboard
                </a>
                <a href="buat-konsultasi.html" class="w-full flex items-center p-3 rounded-lg hover:bg-gray-800 transition text-sm">
                    <span class="mr-3">➕</span> Buat Konsultasi
                </a>
                <a href="riwayat.html" class="bg-gray-700 text-white w-full flex items-center p-3 rounded-lg text-sm font-bold border-r-4 border-blue-500">
                    <span class="mr-3">📂</span> Riwayat Konsultasi
                </a>
            </nav>

            <div class="p-6 border-t border-gray-700 flex flex-col items-center bg-gray-800/50">
                <div class="w-16 h-16 rounded-full profile-ring shadow-lg mb-3 overflow-hidden bg-gray-700 flex items-center justify-center">
                    <img src="../pages/zoga.jpg" 
                         alt="Ananda Zoga" 
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
                         class="w-full h-full object-cover rounded-full">
                    <div class="hidden w-full h-full items-center justify-center text-xs font-bold text-white">AZ</div>
                </div>
                <div class="text-center">
                    <p class="text-[9px] text-blue-400 uppercase font-black tracking-tighter mb-1">Pengembang</p>
                    <p class="text-[11px] font-bold text-gray-100 leading-tight uppercase text-center">Ananda Zoga Syahputra, S.Tr.I.P.</p>
                </div>
                <button onclick="logout()" class="mt-4 w-full px-4 py-2 text-[10px] font-bold uppercase tracking-widest text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg hover:bg-red-500/20 transition active:scale-95">
                    Keluar Sistem
                </button>
            </div>
        </aside>

        <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

        <main class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white border-b p-4 px-6 md:px-8 h-20 flex justify-between items-center shadow-sm flex-shrink-0">
                <div class="flex items-center">
                    <button onclick="toggleSidebar()" class="md:hidden mr-4 p-2 bg-gray-100 rounded-lg text-gray-600">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                    </button>
                    <h2 class="text-sm md:text-lg font-bold text-gray-800 uppercase tracking-wide">Daftar Riwayat</h2>
                </div>
                
                <div class="flex items-center space-x-2 md:space-x-4">
                    <button onclick="refreshData()" class="flex items-center space-x-2 bg-gray-50 hover:bg-gray-100 text-gray-600 px-3 md:px-4 py-2 rounded-xl border border-gray-200 transition active:scale-95 shadow-sm">
                        <span id="refresh-icon">🔄</span>
                        <span class="hidden md:inline text-[10px] font-bold uppercase tracking-widest">Update</span>
                    </button>
                    <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-xl shadow-inner border border-gray-200">👤</div>
                </div>
            </header>

            <div class="p-4 md:p-8">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="overflow-x-auto custom-scrollbar">
                        <table class="w-full text-left border-collapse min-w-[850px]">
                            <thead class="bg-gray-50 border-b border-gray-100">
                                <tr class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">
                                    <th class="p-5 col-waktu">Waktu</th>
                                    <th class="p-5 w-48">Instansi / Metode</th>
                                    <th class="p-5">Detail Konsultasi & Monitoring TL</th>
                                    <th class="p-5 text-center w-32">Status</th>
                                </tr>
                            </thead>
                            <tbody id="listTable" class="divide-y divide-gray-50"></tbody>
                        </table>
                    </div>
                    <div id="loader" class="p-10 text-center text-gray-400 italic text-sm">Menghubungkan ke server...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        (function() {
            if (sessionStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'login.html';
            } else {
                document.body.style.display = "block";
            }
        })();

        const API_URL = "https://script.google.com/macros/s/AKfycbzP4-Sdo7yBZEX-uC33Pw0olR_ACtMFMhkYFwJBmja6oas3pqv4vdnlndDihRciNNJ5/exec";

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        async function refreshData() {
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('spin');
            await loadData();
            setTimeout(() => icon.classList.remove('spin'), 800);
        }

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const listTable = document.getElementById('listTable');
                const loader = document.getElementById('loader');
                
                if (!data || data.length === 0) {
                    loader.innerText = "Belum ada riwayat.";
                    return;
                }
                loader.classList.add('hidden');
                
                listTable.innerHTML = data.reverse().map(item => {
                    const isTerjawab = item.status === 'Terjawab' || item.status === 'Selesai';
                    const isPending = item.status === 'Menunggu';
                    
                    // Badge Metode
                    const metodeBadge = item.metode === 'Offline' 
                        ? `<div class="mt-2 inline-flex flex-col space-y-1">
                             <span class="bg-purple-100 text-purple-700 px-2 py-0.5 rounded text-[8px] font-black uppercase border border-purple-200">Offline</span>
                             <span class="text-[9px] text-purple-600 font-bold italic">📅 ${item.tgl_offline || '-'}</span>
                           </div>`
                        : `<div class="mt-2"><span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-[8px] font-black uppercase border border-blue-200">Online</span></div>`;

                    // Bagian Tindak Lanjut
                    let tlSection = "";
                    if (isTerjawab) {
                        if (item.status_tl === "Belum TL" || item.status_tl === "Perlu Perbaikan") {
                            tlSection = `
                                <div class="mt-4 p-3 bg-blue-50 border border-blue-100 rounded-xl">
                                    <p class="text-[10px] font-bold text-blue-700 uppercase mb-2">🚀 Tindak Lanjut Layanan:</p>
                                    ${item.status_tl === "Perlu Perbaikan" ? `<p class="text-[9px] text-red-600 font-bold mb-2 animate__animated animate__headShake">⚠️ Catatan Auditor: ${item.catatan_admin_tl}</p>` : ''}
                                    <button onclick="formTL(${item.id})" class="w-full py-2 bg-blue-600 text-white rounded-lg text-[10px] font-bold uppercase hover:bg-blue-700 transition shadow-sm">Kirim Bukti Tindak Lanjut</button>
                                </div>
                            `;
                        } else if (item.status_tl === "Menunggu Verifikasi") {
                            tlSection = `
                                <div class="mt-4 p-3 bg-orange-50 border border-orange-100 rounded-xl">
                                    <p class="text-[10px] font-bold text-orange-700 uppercase">⌛ Menunggu Verifikasi TL</p>
                                    <p class="text-[9px] text-orange-600 italic">Bukti telah dikirim pada ${item.waktu_tl}</p>
                                </div>
                            `;
                        } else if (item.status_tl === "Tuntas") {
                            tlSection = `
                                <div class="mt-4 p-3 bg-teal-50 border border-teal-100 rounded-xl flex items-center">
                                    <span class="text-lg mr-2">✅</span>
                                    <div>
                                        <p class="text-[10px] font-bold text-teal-700 uppercase">Tindak Lanjut Tuntas</p>
                                        <p class="text-[9px] text-gray-500 italic">Diverifikasi pada ${item.waktu_verifikasi}</p>
                                    </div>
                                </div>
                            `;
                        }
                    }

                    return `
                    <tr class="hover:bg-gray-50/50 transition border-b border-gray-50">
                        <td class="p-5 text-[9px] text-gray-400 align-top pt-6 col-waktu">${item.waktu}</td>
                        <td class="p-5 font-bold text-sm text-gray-700 align-top pt-6">
                            ${item.opd}
                            ${metodeBadge}
                        </td>
                        <td class="p-5 align-top pt-6">
                            <div class="text-sm font-bold text-gray-800">${item.judul}</div>
                            <div class="text-[10px] text-blue-500 font-semibold italic mb-2 uppercase">${item.kategori}</div>
                            
                            <div class="flex space-x-2 mb-3">
                                ${item.lampiran && item.lampiran !== '-' ? `<a href="${item.lampiran}" target="_blank" class="px-3 py-1.5 bg-gray-100 text-gray-600 border border-gray-200 rounded-lg text-[9px] font-bold uppercase tracking-wider">📂 Lampiran</a>` : ''}
                                ${isPending ? `<button onclick="batalkanKonsultasi('${item.id}')" class="px-3 py-1.5 bg-red-50 text-red-600 border border-red-200 rounded-lg text-[9px] font-bold uppercase tracking-wider">❌ Batalkan</button>` : ''}
                            </div>

                            <details class="group border border-gray-200 rounded-lg bg-white overflow-hidden shadow-sm max-w-lg">
                                <summary class="list-none p-2 text-[10px] font-bold text-gray-600 cursor-pointer flex items-center hover:bg-gray-50 uppercase tracking-tighter">
                                    <span class="mr-2 group-open:rotate-90 transition-transform text-[8px]">▶</span> LIHAT TANGGAPAN AUDITOR
                                </summary>
                                <div class="p-4 space-y-4 border-t border-gray-100 bg-gray-50/30">
                                    <div class="bg-white p-3 rounded-lg border border-gray-200">
                                        <p class="text-[9px] font-bold text-gray-400 uppercase mb-1">Masalah:</p>
                                        <p class="text-xs text-gray-700">${item.issue || '-'}</p>
                                    </div>
                                    <div class="${isTerjawab ? 'bg-green-50 border-green-100' : 'bg-yellow-50 border-yellow-100'} p-3 rounded-lg border">
                                        <p class="text-[9px] font-bold ${isTerjawab ? 'text-green-700' : 'text-yellow-700'} uppercase">Jawaban Inspektorat:</p>
                                        <p class="text-xs text-gray-800 italic font-medium">"${item.jawaban || 'Sedang diproses...'}"</p>
                                    </div>
                                </div>
                            </details>
                            
                            ${tlSection}
                        </td>
                        <td class="p-5 text-center align-top pt-6">
                            <span class="inline-block w-24 py-1.5 ${isTerjawab ? 'bg-green-100 text-green-700 border-green-200' : 'bg-yellow-100 text-yellow-700 border-yellow-200'} text-[9px] font-bold rounded-full uppercase border">
                                ${item.status}
                            </span>
                        </td>
                    </tr>`;
                }).join('');
            } catch (e) {
                document.getElementById('loader').innerText = "⚠️ Gagal memuat data.";
            }
        }

        async function formTL(rowId) {
            const { value: text } = await Swal.fire({
                title: 'Kirim Bukti Tindak Lanjut',
                input: 'textarea',
                inputLabel: 'Keterangan / Link Dokumen Bukti',
                inputPlaceholder: 'Masukkan link Google Drive dokumen tindak lanjut atau penjelasan singkat...',
                inputAttributes: { 'aria-label': 'Masukkan bukti TL' },
                showCancelButton: true,
                confirmButtonText: 'Kirim Bukti',
                confirmButtonColor: '#2563eb',
                customClass: { popup: 'rounded-3xl' }
            });

            if (text) {
                Swal.fire({ title: 'Mengirim...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
                try {
                    await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: "kirim_tindak_lanjut", row: rowId, bukti_tl: text })
                    });
                    Swal.fire({ icon: 'success', title: 'Berhasil!', text: 'Bukti TL telah dikirim dan menunggu verifikasi.', timer: 2000, showConfirmButton: false });
                    refreshData();
                } catch (e) {
                    Swal.fire('Gagal', 'Terjadi kesalahan sistem.', 'error');
                }
            }
        }

        function batalkanKonsultasi(id) {
            Swal.fire({
                title: 'Batalkan Konsultasi?',
                text: "Data akan dihapus permanen.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'Ya, Hapus!',
                customClass: { popup: 'rounded-3xl' }
            }).then((result) => {
                if (result.isConfirmed) {
                    fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: "hapus_konsultasi", id: id })
                    }).then(() => refreshData());
                }
            });
        }

        window.onload = loadData;
        function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }
    </script>
</body>
</html>
