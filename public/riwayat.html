<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Konsultasi | E-Consulting</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <div class="flex h-screen overflow-hidden relative">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-[#1F2937] text-gray-300 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col">
            <div class="p-8 border-b border-gray-700 flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-bold text-white tracking-tight">SiCODI</h1>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest leading-tight">Inspektorat Daerah<br>Kabupaten Malang</p>
                </div>
                <button onclick="toggleSidebar()" class="md:hidden text-gray-400">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            
            <nav class="flex-1 mt-6 px-4 space-y-1">
                <a href="index.html" class="w-full flex items-center p-3 rounded-lg hover:bg-gray-800 transition text-sm">
                    <span class="mr-3">📊</span> Dashboard
                </a>
                <a href="buat-konsultasi.html" class="w-full flex items-center p-3 rounded-lg hover:bg-gray-800 transition text-sm">
                    <span class="mr-3">➕</span> Buat Konsultasi
                </a>
                <a href="riwayat.html" class="bg-gray-700 text-white w-full flex items-center p-3 rounded-lg text-sm font-bold border-r-4 border-gray-400">
                    <span class="mr-3">📂</span> Riwayat Konsultasi
                </a>
            </nav>

            <div class="p-6 border-t border-gray-700 text-center">
                <p class="text-[9px] text-gray-500 uppercase">Pengembang</p>
                <p class="text-xs font-bold text-gray-300 uppercase tracking-tighter">Ananda Zoga Syahputra</p>
            </div>
        </aside>

        <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

        <main class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white border-b border-gray-200 p-4 flex justify-between items-center px-6 h-20 flex-shrink-0">
                <div class="flex items-center">
                    <button onclick="toggleSidebar()" class="md:hidden mr-4 p-2 bg-gray-100 rounded-lg text-gray-600">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                    </button>
                    <h2 class="text-sm md:text-lg font-bold text-gray-800 uppercase tracking-wide">Daftar Riwayat Konsultasi</h2>
                </div>
                <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center border text-xl shadow-inner">👤</div>
            </header>

            <div class="p-6 md:p-8">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-gray-50 border-b border-gray-100">
                                <tr class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">
                                    <th class="p-5">Tanggal</th>
                                    <th class="p-5">Instansi</th>
                                    <th class="p-5">Judul & Kategori</th>
                                    <th class="p-5 text-center">Status</th>
                                </tr>
                            </thead>
                            <tbody id="consultList" class="divide-y divide-gray-50 text center">
                                </tbody>
                        </table>
                    </div>
                    <div id="emptyState" class="hidden p-20 text-center">
                        <svg class="h-12 w-12 mx-auto text-gray-300 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                        </svg>
                        <p class="text-gray-400 text-sm italic">Belum ada riwayat konsultasi yang tersimpan.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Logika Sidebar Mobile
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        // Fungsi Memuat Data
        function loadData() {
            const data = JSON.parse(localStorage.getItem('consultations')) || [];
            const listTable = document.getElementById('consultList');
            const emptyState = document.getElementById('emptyState');

            if (data.length === 0) {
                listTable.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');
            listTable.innerHTML = data.map((item, index) => `
                <tr class="hover:bg-gray-50 transition">
                    <td class="p-5 text-xs text-gray-400">${item.date || '-'}</td>
                    <td class="p-5 font-bold text-sm text-gray-700">${item.opd}</td>
                    <td class="p-5">
                        <div class="text-sm font-bold text-gray-800">${item.subject}</div>
                        <div class="text-[10px] text-gray-400 uppercase font-semibold">${item.type}</div>
                    </td>
                    <td class="p-5"><span class="px-2 py-1 bg-yellow-100 text-yellow-700 text-[10px] font-bold rounded">${item.status}</span></td>
                    <td class="p-5 text-center">
                    </button>
                        </div>
                    </td>
                </tr>
            `).reverse().join(''); // Reverse agar data terbaru muncul di paling atas
        }

        // Jalankan saat halaman dibuka
        loadData();
    </script>
</body>
</html>
