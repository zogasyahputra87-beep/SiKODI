<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Konsultasi | E-Consulting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animasi halus untuk membuka jawaban */
        details[open] summary ~ * {
            animation: sweep .3s ease-in-out;
        }
        @keyframes sweep {
            0%    {opacity: 0; margin-top: -10px}
            100%  {opacity: 1; margin-top: 0px}
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-72 bg-[#1F2937] text-gray-300 flex-shrink-0 hidden md:flex flex-col">
            <div class="p-8 border-b border-gray-700">
                <h1 class="text-xl font-bold text-white">E-CONSULTING</h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">Inspektorat Kab. Malang</p>
            </div>
            <nav class="flex-1 mt-6 px-4 space-y-1">
                <a href="index.html" class="flex p-3 rounded-lg hover:bg-gray-800 text-sm">Dashboard</a>
                <a href="buat-konsultasi.html" class="flex p-3 rounded-lg hover:bg-gray-800 text-sm">Buat Konsultasi</a>
                <a href="riwayat.html" class="bg-gray-700 text-white flex p-3 rounded-lg text-sm font-bold border-r-4 border-blue-500">Riwayat Konsultasi</a>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white border-b p-4 px-8 h-20 flex justify-between items-center shadow-sm">
                <h2 class="font-bold text-gray-800 uppercase">Riwayat Konsultasi</h2>
                <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-xl shadow-inner">👤</div>
            </header>

            <div class="p-8">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-50 border-b border-gray-100">
                            <tr class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">
                                <th class="p-5">Waktu</th>
                                <th class="p-5">Instansi</th>
                                <th class="p-5">Judul & Jenis</th>
                                <th class="p-5 text-center">Status</th>
                            </tr>
                        </thead>
                        <tbody id="listTable" class="divide-y divide-gray-50"></tbody>
                    </table>
                    <div id="loader" class="p-10 text-center text-gray-400 italic text-sm">Memuat data riwayat...</div>
                </div>
                <p class="mt-4 text-[10px] text-gray-400 italic">* Klik "Lihat Jawaban" pada kolom Judul jika status sudah Selesai.</p>
            </div>
        </main>
    </div>

    <script>
        // Gunakan URL API yang sama dengan Admin
        const API_URL = "https://script.google.com/macros/s/AKfycbxSBT9nnto_EJa8XadSUtUi4zNRExIyWNwSHA05lrrV-WqKgRo71zEQze2lc-LkOO1d/exec";

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                document.getElementById('loader').classList.add('hidden');
                
                document.getElementById('listTable').innerHTML = data.reverse().map(item => `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="p-5 text-xs text-gray-400 align-top pt-6">${item.waktu}</td>
                        <td class="p-5 font-bold text-sm text-gray-700 align-top pt-6">${item.opd}</td>
                        <td class="p-5 align-top pt-6">
                            <div class="text-sm font-bold text-gray-800">${item.judul}</div>
                            <div class="text-[10px] text-gray-400 uppercase font-semibold italic mb-3">${item.kategori}</div>
                            
                            ${item.status === 'Selesai' ? `
                                <details class="group border border-blue-100 rounded-lg bg-blue-50/30">
                                    <summary class="list-none p-2 text-[10px] font-bold text-blue-600 cursor-pointer flex items-center hover:bg-blue-50 rounded-lg transition">
                                        <span class="mr-2 group-open:rotate-90 transition-transform">▶</span> 
                                        LIHAT JAWABAN INSPEKTORAT
                                    </summary>
                                    <div class="p-3 text-xs text-gray-700 leading-relaxed border-t border-blue-100 bg-white rounded-b-lg">
                                        <p class="font-semibold text-blue-800 mb-1 underline">Tanggapan Resmi:</p>
                                        ${item.jawaban || "Status sudah selesai, namun tidak ada rincian jawaban tertulis."}
                                    </div>
                                </details>
                            ` : `
                                <div class="inline-block px-3 py-1 bg-gray-100 text-[9px] text-gray-400 font-bold rounded italic uppercase">
                                    Menunggu Verifikasi & Jawaban
                                </div>
                            `}
                        </td>
                        <td class="p-5 text-center align-top pt-6">
                            <div class="flex justify-center">
                                <span class="inline-block w-24 py-1.5 ${item.status === 'Selesai' ? 'bg-green-100 text-green-700 border-green-200' : 'bg-yellow-100 text-yellow-700 border-yellow-200'} text-[10px] font-bold rounded-full uppercase border text-center">
                                    ${item.status}
                                </span>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                document.getElementById('loader').innerText = "Gagal memuat data dari server. Periksa koneksi atau URL API.";
            }
        }
        window.onload = loadData;
    </script>
