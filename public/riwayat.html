    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animasi halus untuk membuka jawaban */
        details[open] summary ~ * {
            animation: sweep .3s ease-in-out;
        }
        @keyframes sweep {
            0%    {opacity: 0; margin-top: -10px}
            100%  {opacity: 1; margin-top: 0px}
        }
        
        /* Membatasi lebar kolom waktu agar lebih hemat ruang */
        .col-waktu { width: 90px; min-width: 90px; }
        
        /* Animasi putar untuk tombol refresh */
        .spin {
            animation: rotate 0.8s linear;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Gaya Scrollbar untuk Tabel agar lebih cantik di HP */
        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
