<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat | SiCODI Inspektorat</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        body {
            user-select: none;
            -webkit-user-select: none;
            display: none; 
        }

        details[open] summary ~ * {
            animation: sweep .3s ease-in-out;
        }
        @keyframes sweep {
            0%    {opacity: 0; margin-top: -10px}
            100%  {opacity: 1; margin-top: 0px}
        }
        
        .col-waktu { width: 90px; min-width: 90px; }
        
        .spin { animation: rotate 0.8s linear; }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 overflow-hidden">

    <div class="flex h-screen overflow-hidden relative">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-[#1F2937] text-gray-300 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col shadow-2xl md:shadow-none">
            <div class="p-8 border-b border-gray-700 flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-bold text-white tracking-tight">SiCODI</h1>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest leading-tight">Inspektorat Daerah<br>Kabupaten Malang</p>
                </div>
                <button onclick="toggleSidebar()" class="md:hidden text-gray-400">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            
            <nav class="flex-1 mt-6 px-4 space-y-1">
                <a href="index.html" class="w-full flex items-center p-3 rounded-lg hover:bg-gray-800 transition text-sm">
                    <span class="mr-3">📊</span> Dashboard
                </a>
                <a href="buat-konsultasi.html" class="w-full flex items-center p-3 rounded-lg hover:bg-gray-800 transition text-sm">
                    <span class="mr-3">➕</span> Buat Konsultasi
                </a>
                <a href="riwayat.html" class="bg-gray-700 text-white w-full flex items-center p-3 rounded-lg text-sm font-bold border-r-4 border-blue-500">
                    <span class="mr-3">📂</span> Riwayat Konsultasi
                </a>
            </nav>

            <div class="p-6 border-t border-gray-700 text-center">
                <p class="text-[9px] text-gray-500 uppercase">Pengembang</p>
                <p class="text-xs font-bold text-gray-300 uppercase tracking-tighter">Ananda Zoga Syahputra, S.Tr.I.P.</p>
                <button onclick="logout()" class="mt-4 w-full px-4 py-2 text-[10px] font-bold uppercase tracking-widest text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg hover:bg-red-500/20 transition active:scale-95">
                    Keluar Sistem
                </button>
            </div>
        </aside>

        <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

        <main class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white border-b p-4 px-6 md:px-8 h-20 flex justify-between items-center shadow-sm flex-shrink-0">
                <div class="flex items-center">
                    <button onclick="toggleSidebar()" class="md:hidden mr-4 p-2 bg-gray-100 rounded-lg text-gray-600">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                    </button>
                    <h2 class="text-sm md:text-lg font-bold text-gray-800 uppercase tracking-wide">Daftar Riwayat</h2>
                </div>
                
                <div class="flex items-center space-x-2 md:space-x-4">
                    <button onclick="refreshData()" class="flex items-center space-x-2 bg-gray-50 hover:bg-gray-100 text-gray-600 px-3 md:px-4 py-2 rounded-xl border border-gray-200 transition active:scale-95 shadow-sm">
                        <span id="refresh-icon">🔄</span>
                        <span class="hidden md:inline text-[10px] font-bold uppercase tracking-widest">Update</span>
                    </button>
                    <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-xl shadow-inner border border-gray-200">👤</div>
                </div>
            </header>

            <div class="p-4 md:p-8">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="overflow-x-auto custom-scrollbar">
                        <table class="w-full text-left border-collapse min-w-[850px]">
                            <thead class="bg-gray-50 border-b border-gray-100">
                                <tr class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">
                                    <th class="p-5 col-waktu">Waktu</th>
                                    <th class="p-5 w-48">Instansi</th>
                                    <th class="p-5">Detail Konsultasi & Jawaban</th>
                                    <th class="p-5 text-center w-32">Status</th>
                                </tr>
                            </thead>
                            <tbody id="listTable" class="divide-y divide-gray-50"></tbody>
                        </table>
                    </div>
                    <div id="loader" class="p-10 text-center text-gray-400 italic text-sm">Menghubungkan ke server...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 1. KEAMANAN
        (function() {
            if (sessionStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'login.html';
            } else {
                document.body.style.display = "block";
            }
        })();

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };

        const API_URL = "https://script.google.com/macros/s/AKfycbyX-a7p08hDx5yT-GCznvANR0Ttc_XT5CE5QtBRR_JVYuR5V4XMTdrYNoppQQhLLf9b/exec";

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        // Fitur Logout dengan SweetAlert
        function logout() {
            Swal.fire({
                title: 'Keluar Sistem?',
                text: "Anda akan kembali ke halaman login.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#1F2937',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Ya, Keluar!',
                cancelButtonText: 'Batal',
                customClass: { popup: 'rounded-3xl' }
            }).then((result) => {
                if (result.isConfirmed) {
                    sessionStorage.clear();
                    window.location.href = 'login.html';
                }
            });
        }

        async function refreshData() {
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('spin');
            await loadData();
            setTimeout(() => icon.classList.remove('spin'), 800);
        }

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const listTable = document.getElementById('listTable');
                const loader = document.getElementById('loader');
                
                if (!data || data.length === 0) {
                    loader.innerText = "Belum ada riwayat.";
                    return;
                }
                loader.classList.add('hidden');
                
                listTable.innerHTML = data.reverse().map(item => {
                    const isPending = item.status !== 'Selesai';
                    return `
                    <tr class="hover:bg-gray-50/50 transition border-b border-gray-50">
                        <td class="p-5 text-[9px] text-gray-400 align-top pt-6 col-waktu">${item.waktu}</td>
                        <td class="p-5 font-bold text-sm text-gray-700 align-top pt-6">${item.opd}</td>
                        <td class="p-5 align-top pt-6">
                            <div class="text-sm font-bold text-gray-800">${item.judul}</div>
                            <div class="text-[10px] text-blue-500 font-semibold italic mb-2 uppercase">${item.kategori}</div>
                            
                            <div class="flex space-x-2 mb-3">
                                ${item.lampiran ? 
                                    `<a href="${item.lampiran}" target="_blank" class="px-3 py-1.5 bg-blue-600 text-white rounded-lg text-[9px] font-bold uppercase tracking-wider shadow-sm">📂 Buka Lampiran</a>` : ''
                                }
                                ${isPending ? 
                                    `<button onclick="batalkanKonsultasi('${item.id}')" class="px-3 py-1.5 bg-red-50 text-red-600 border border-red-200 rounded-lg text-[9px] font-bold uppercase tracking-wider hover:bg-red-100 transition shadow-sm">❌ Batalkan</button>` : ''
                                }
                            </div>

                            <details class="group border border-gray-200 rounded-lg bg-white overflow-hidden shadow-sm max-w-lg mb-4">
                                <summary class="list-none p-2 text-[10px] font-bold text-gray-600 cursor-pointer flex items-center hover:bg-gray-50 uppercase tracking-tighter">
                                    <span class="mr-2 group-open:rotate-90 transition-transform text-[8px]">▶</span> DETAIL KONSULTASI
                                </summary>
                                <div class="p-4 space-y-4 border-t border-gray-100 bg-gray-50/30">
                                    <div class="bg-white p-3 rounded-lg border border-gray-200">
                                        <p class="text-[9px] font-bold text-gray-400 uppercase mb-1">Permasalahan:</p>
                                        <p class="text-xs text-gray-700">${item.issue || '-'}</p>
                                    </div>
                                    <div class="${!isPending ? 'bg-green-50 border border-green-100' : 'bg-yellow-50 border border-yellow-100'} p-3 rounded-lg">
                                        <p class="text-[9px] font-bold ${!isPending ? 'text-green-700' : 'text-yellow-700'} uppercase">Tanggapan:</p>
                                        <p class="text-xs text-gray-800 italic font-medium">"${item.jawaban || 'Sedang diproses...'}"</p>
                                    </div>
                                </div>
                            </details>
                        </td>
                        <td class="p-5 text-center align-top pt-6">
                            <span class="inline-block w-24 py-1.5 ${!isPending ? 'bg-green-100 text-green-700 border-green-200' : 'bg-yellow-100 text-yellow-700 border-yellow-200'} text-[9px] font-bold rounded-full uppercase border shadow-sm">
                                ${item.status}
                            </span>
                        </td>
                    </tr>`;
                }).join('');
            } catch (e) {
                document.getElementById('loader').innerText = "⚠️ Gagal memuat data.";
            }
        }

        // Fitur Batalkan Konsultasi dengan SweetAlert
        function batalkanKonsultasi(id) {
            Swal.fire({
                title: 'Batalkan Konsultasi?',
                text: "Data yang sudah dihapus tidak dapat dikembalikan.",
                icon: 'error',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#aaa',
                confirmButtonText: 'Ya, Batalkan!',
                cancelButtonText: 'Jangan',
                customClass: { popup: 'rounded-3xl' }
            }).then((result) => {
                if (result.isConfirmed) {
                    Swal.fire({
                        title: 'Memproses...',
                        didOpen: () => { Swal.showLoading() },
                        allowOutsideClick: false,
                        customClass: { popup: 'rounded-3xl' }
                    });
                    
                    // Logika hapus data ke Apps Script
                    fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: "hapus_konsultasi", id: id })
                    }).then(() => {
                        Swal.fire({
                            title: 'Dibatalkan!',
                            text: 'Konsultasi berhasil dihapus.',
                            icon: 'success',
                            timer: 1500,
                            showConfirmButton: false,
                            customClass: { popup: 'rounded-3xl' }
                        }).then(() => refreshData());
                    });
                }
            });
        }

        window.onload = loadData;
    </script>
</body>
</html>
