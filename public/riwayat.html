<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Konsultasi | PAMAN SIGIT</title>

    <link rel="icon" type="image/png" href="../pages/logo_kab.png">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        body { user-select: none; -webkit-user-select: none; display: none; }
        .bg-paman-dark { background-color: #1F2937; }
        .profile-ring { padding: 2px; background: linear-gradient(to bottom right, #3b82f6, #1e40af); }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .watermark-fixed {
            position: fixed; bottom: -30px; right: -30px; width: 500px; height: 500px;
            background-image: url('../pages/inspektorat.png');
            background-size: contain; background-repeat: no-repeat; background-position: center;
            opacity: 0.5; z-index: 0; pointer-events: none;
        }

        /* Checkbox styling */
        .row-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: #3b82f6; }

        #profile-menu { transform-origin: top right; transition: all 0.2s ease-out; }
        .menu-hidden { transform: scale(0.95); opacity: 0; pointer-events: none; }
        .menu-visible { transform: scale(1); opacity: 1; pointer-events: auto; }

        .timeline-step { position: relative; padding-left: 1.5rem; margin-bottom: 0.75rem; border-left: 2px solid #e5e7eb; }
        .timeline-step::before { content: ''; position: absolute; left: -0.45rem; top: 0.25rem; width: 0.8rem; height: 0.8rem; border-radius: 50%; background: #cbd5e1; border: 2px solid #fff; }
        .timeline-active::before { background: #3b82f6; }
        .timeline-success::before { background: #10b981; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 overflow-hidden">

    <div class="watermark-fixed"></div>

    <div class="flex h-screen overflow-hidden relative z-10">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-paman-dark text-gray-300 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col shadow-2xl">
            <div class="p-6 border-b border-gray-700 flex flex-col items-center">
                <img src="../pages/logo_kab.png" alt="Logo" class="w-14 mb-3 drop-shadow-md">
                <div class="text-center">
                    <h1 class="text-xl font-bold text-white tracking-tight">PAMAN SIGIT</h1>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest leading-tight font-bold">Inspektorat Daerah<br>Kabupaten Malang</p>
                </div>
            </div>
            <nav class="flex-1 mt-6 px-4 space-y-1">
                <a href="index.html" class="w-full flex items-center p-3 rounded-lg hover:bg-gray-800 transition text-sm">📊 Dashboard</a>
                <a href="buat-konsultasi.html" class="w-full flex items-center p-3 rounded-lg hover:bg-gray-800 transition text-sm">➕ Buat Konsultasi</a>
                <a href="riwayat.html" class="bg-gray-700 text-white w-full flex items-center p-3 rounded-lg text-sm font-bold border-r-4 border-blue-500">📂 Riwayat Konsultasi</a>
            </nav>

            <div class="p-6 border-t border-gray-700 flex flex-col items-center bg-gray-800/50 relative">
                <div class="w-16 h-16 rounded-full profile-ring shadow-lg mb-3 overflow-hidden bg-gray-700">
                    <img src="../pages/zoga.jpg" alt="Zoga" onerror="this.src='https://ui-avatars.com/api/?name=Ananda+Zoga'" class="w-full h-full object-cover">
                </div>
                <div class="text-center">
                    <p class="text-[9px] text-blue-400 uppercase font-black tracking-tighter mb-1">Pengembang Sistem</p>
                    <p class="text-[11px] font-bold text-gray-100 uppercase text-center leading-tight">Ananda Zoga Syahputra, S.Tr.I.P.</p>
                </div>
                <button onclick="logout()" class="mt-4 w-full px-4 py-2 text-[10px] font-bold uppercase text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg hover:bg-red-500/20 transition">Keluar Sistem</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white border-b border-gray-200 p-4 flex justify-between items-center px-8 h-20 sticky top-0 z-30 shadow-sm">
                <div class="flex items-center space-x-4">
                    <button onclick="toggleSidebar()" class="md:hidden p-2 bg-gray-100 rounded-lg"><svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg></button>
                    <div>
                        <h2 class="text-lg font-black text-gray-800 uppercase leading-tight">Monitoring Riwayat</h2>
                        <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">Pilih data untuk diunduh</p>
                    </div>
                </div>
                
                <div class="flex items-center space-x-3">
                    <button onclick="exportData('pdf')" class="flex items-center space-x-2 bg-red-50 hover:bg-red-100 text-red-600 px-3 py-2 rounded-xl border border-red-100 transition text-[10px] font-black uppercase">
                        <span>PDF</span>
                    </button>
                    <button onclick="exportData('excel')" class="flex items-center space-x-2 bg-green-50 hover:bg-green-100 text-green-600 px-3 py-2 rounded-xl border border-green-100 transition text-[10px] font-black uppercase">
                        <span>EXCEL</span>
                    </button>

                    <div class="relative">
                        <button onclick="toggleProfileMenu()" id="profile-btn" class="flex items-center pl-4 border-l border-gray-200 focus:outline-none">
                            <div class="w-10 h-10 bg-gray-100 rounded-xl profile-ring shadow-lg ring-2 ring-blue-50 overflow-hidden">
                                <img id="head-avatar" src="https://ui-avatars.com/api/?name=User" class="w-full h-full object-cover">
                            </div>
                        </button>
                        <div id="profile-menu" class="menu-hidden absolute right-0 mt-3 w-56 bg-white rounded-2xl shadow-2xl border border-gray-100 py-2 z-50">
                            <div class="px-4 py-3 border-b border-gray-50">
                                <p id="drop-nama-opd" class="text-xs font-black text-gray-800 truncate">Nama OPD</p>
                            </div>
                            <button onclick="gantiProfil()" class="w-full text-left px-4 py-2 text-xs text-gray-600 hover:bg-blue-50">🖼️ Ganti Profil</button>
                            <button onclick="formGantiPassword()" class="w-full text-left px-4 py-2 text-xs text-gray-600 hover:bg-blue-50">🔑 Ganti Password</button>
                            <button onclick="logout()" class="w-full text-left px-4 py-2 text-xs text-red-500 font-bold uppercase">🚀 Keluar</button>
                        </div>
                    </div>
                </div>
            </header>

            <div class="p-6 md:p-10 relative z-10">
                <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8" id="stats-container"></div>

                <div class="bg-white rounded-3xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                        <input type="text" id="searchInput" onkeyup="filterRiwayat()" placeholder="Cari No. Registrasi atau Judul..." class="p-3 border border-gray-200 rounded-xl text-xs w-full max-w-md focus:ring-2 focus:ring-blue-500 outline-none">
                        <div class="text-[10px] font-bold text-blue-600 uppercase italic" id="selected-count">0 Data Terpilih</div>
                    </div>
                    <div class="overflow-x-auto custom-scrollbar">
                        <table class="w-full text-left border-collapse min-w-[1000px]">
                            <thead class="bg-gray-50 text-[10px] text-gray-400 uppercase font-bold tracking-widest border-b">
                                <tr>
                                    <th class="p-5 text-center" style="width: 50px">
                                        <input type="checkbox" id="selectAll" onclick="toggleAllCheckboxes()" class="row-checkbox">
                                    </th>
                                    <th class="p-5" style="width: 150px">No. Registrasi</th>
                                    <th class="p-5" style="width: 150px">Kategori</th>
                                    <th class="p-5">Detail Monitoring</th>
                                    <th class="p-5 text-center" style="width: 120px">Status</th>
                                </tr>
                            </thead>
                            <tbody id="listTable" class="divide-y divide-gray-50 text-sm"></tbody>
                        </table>
                    </div>
                    <div id="loader" class="p-10 text-center text-gray-400 italic text-sm">Memuat Riwayat...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = "https://afaiwyfodjllolzwbhmz.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_0Jj5RTBAL3gewJvwOsvAxA_aPu370Bl"; 
        const headers = { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" };
        
        let rawRiwayat = [];

        (function() {
            if (sessionStorage.getItem('isLoggedIn') !== 'true') { window.location.href = 'login.html'; } 
            else {
                document.body.style.display = "block";
                document.getElementById('drop-nama-opd').innerText = sessionStorage.getItem('namaOpd');
                loadData();
                fetchProfilTerbaru();
            }
        })();

        async function loadData() {
            const user = sessionStorage.getItem('userName');
            const url = `${SUPABASE_URL}/rest/v1/konsultasi?username=eq.${user}&order=waktu_pengajuan.desc`;
            try {
                const res = await fetch(url, { headers });
                rawRiwayat = await res.json();
                renderRiwayat(rawRiwayat);
                updateStats(rawRiwayat);
            } catch (e) { document.getElementById('loader').innerText = "Gagal memuat data."; }
        }

        function renderRiwayat(data) {
            const table = document.getElementById('listTable');
            const loader = document.getElementById('loader');
            if (data.length === 0) { table.innerHTML = ""; loader.innerText = "Tidak ada data."; return; }
            loader.classList.add('hidden');
            
            table.innerHTML = data.map(item => {
                const regNum = `REG/ITDA/${new Date(item.waktu_pengajuan).toLocaleDateString('id-ID').replace(/\//g,'')}/${("0000" + item.id).slice(-4)}`;
                const terjawab = item.jawaban && item.jawaban !== "";
                
                return `<tr>
                    <td class="p-5 text-center"><input type="checkbox" class="row-checkbox data-check" value="${item.id}" onclick="updateSelectedCount()"></td>
                    <td class="p-5 align-top pt-6 font-black text-blue-600 text-[11px]">${regNum}</td>
                    <td class="p-5 align-top pt-6"><div class="text-[10px] font-bold uppercase text-blue-500">${item.kategori}</div></td>
                    <td class="p-5 align-top pt-6">
                        <div class="font-bold text-gray-800 mb-2">${item.judul_masalah}</div>
                        <div class="bg-gray-50 p-3 rounded-xl border border-gray-100 text-xs">
                            <div class="timeline-step timeline-success"><b>Pengajuan:</b> ${item.rincian_masalah}</div>
                            <div class="timeline-step ${terjawab ? 'timeline-active' : ''}"><b>Tanggapan:</b> ${item.jawaban || 'Menunggu...'}</div>
                        </div>
                    </td>
                    <td class="p-5 text-center align-top pt-6">
                        <span class="px-3 py-1 rounded-full text-[9px] font-bold uppercase border ${item.status_tl === 'Tuntas' ? 'bg-teal-50 text-teal-600 border-teal-200' : 'bg-yellow-50 text-yellow-600 border-yellow-200'}">
                            ${item.status_tl}
                        </span>
                    </td>
                </tr>`;
            }).join('');
        }

        // --- FITUR SELEKSI & EXPORT ---
        function toggleAllCheckboxes() {
            const isChecked = document.getElementById('selectAll').checked;
            document.querySelectorAll('.data-check').forEach(cb => cb.checked = isChecked);
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const count = document.querySelectorAll('.data-check:checked').length;
            document.getElementById('selected-count').innerText = `${count} Data Terpilih`;
        }

        function getSelectedData() {
            const selectedIds = Array.from(document.querySelectorAll('.data-check:checked')).map(cb => cb.value);
            return rawRiwayat.filter(item => selectedIds.includes(item.id.toString()));
        }

        async function exportData(type) {
            const dataToExport = getSelectedData();
            if (dataToExport.length === 0) return Swal.fire('Pilih Data', 'Centang minimal satu data yang ingin dicetak!', 'warning');

            if (type === 'pdf') {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('l', 'mm', 'a4');
                doc.text("LAPORAN RIWAYAT KONSULTASI - PAMAN SIGIT", 14, 15);
                const body = dataToExport.map(item => [item.id, item.kategori, item.judul_masalah, item.status_tl]);
                doc.autoTable({ head: [['ID', 'Kategori', 'Judul', 'Status']], body: body, startY: 25, theme: 'grid' });
                doc.save('Riwayat_PamanSigit.pdf');
            } else {
                const worksheet = XLSX.utils.json_to_sheet(dataToExport);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Riwayat");
                XLSX.utils.writeFile(workbook, "Riwayat_PamanSigit.xlsx");
            }
            Swal.fire('Berhasil', `Data berhasil diekspor ke ${type.toUpperCase()}`, 'success');
        }

        // --- FUNGSI PROFIL & SISTEM ---
        async function logout() {
            const res = await Swal.fire({ title: 'Keluar?', text: "Yakin ingin keluar?", icon: 'warning', showCancelButton: true, confirmButtonColor: '#1F2937' });
            if (res.isConfirmed) { sessionStorage.clear(); window.location.href = 'login.html'; }
        }
        function toggleProfileMenu() { const m = document.getElementById('profile-menu'); m.classList.toggle('menu-hidden'); m.classList.toggle('menu-visible'); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
        async function fetchProfilTerbaru() {
            const user = sessionStorage.getItem('userName');
            const res = await fetch(`${SUPABASE_URL}/rest/v1/users_opd?username=eq.${user}&select=foto_profil`, { headers });
            const data = await res.json();
            if (data[0]?.foto_profil) {
                let url = data[0].foto_profil;
                if (url.includes('drive.google.com')) {
                    const id = url.split('/d/')[1]?.split('/')[0] || url.split('id=')[1];
                    url = `https://drive.google.com/uc?export=view&id=${id}`;
                }
                document.getElementById('head-avatar').src = url + '?t=' + Date.now();
            }
        }
        // ... (Fungsi Ganti Password & Ganti Profil Sama dengan Dashboard) ...
    </script>
</body>
</html>
