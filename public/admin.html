<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | SiCODI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* PROTEKSI: Mencegah seleksi teks dan menyembunyikan body awal */
        body {
            user-select: none;
            -webkit-user-select: none;
            display: none; 
        }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">
    <div class="flex h-screen overflow-hidden relative">
        
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-gray-900 text-gray-300 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col shadow-2xl md:shadow-none">
            <div class="p-8 border-b border-gray-800 flex justify-between items-center">
                <div class="text-center w-full">
                    <h1 class="text-xl font-black text-white">ADMIN PANEL</h1>
                    <p class="text-[9px] text-gray-500 uppercase font-bold tracking-widest">Inspektorat Kab. Malang</p>
                </div>
                <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-white">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <nav class="flex-1 mt-6 px-4 space-y-2">
                <div class="bg-blue-600/10 text-blue-400 p-3 rounded-lg text-sm font-bold border-l-4 border-blue-500">🛡️ Kelola Konsultasi</div>
                <a href="index.html" class="block p-3 text-gray-400 hover:text-white text-[10px] uppercase font-bold tracking-tighter transition">← Dashboard User</a>
            </nav>
            <div class="p-6 border-t border-gray-800">
                <button onclick="logout()" class="text-[10px] text-red-400 font-bold uppercase tracking-widest bg-red-900/20 px-4 py-2 rounded-lg border border-red-900/30 w-full transition active:scale-95">Keluar</button>
            </div>
        </aside>

        <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

        <main class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white border-b p-4 px-8 h-20 flex justify-between items-center shadow-sm">
                <div class="flex items-center">
                    <button onclick="toggleSidebar()" class="md:hidden mr-4 p-2 bg-gray-100 rounded-lg text-gray-600 hover:bg-gray-200 transition">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                    </button>
                    <h2 class="font-bold text-gray-800 uppercase text-sm tracking-wide">Moderasi Pertanyaan & Jawaban</h2>
                </div>
                <button onclick="fetchAdmin()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-[10px] font-bold hover:bg-blue-700 uppercase shadow-md transition active:scale-95">🔄 Refresh Data</button>
            </header>

            <div class="p-8">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="overflow-x-auto custom-scrollbar">
                        <table class="w-full text-left min-w-[950px]">
                            <thead class="bg-gray-50 border-b border-gray-100">
                                <tr class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">
                                    <th class="p-5">Waktu & Instansi</th>
                                    <th class="p-5">Detail Masalah & Jawaban</th>
                                    <th class="p-5 text-center">Status</th>
                                    <th class="p-5 text-center">Tindakan</th>
                                </tr>
                            </thead>
                            <tbody id="adminBody" class="divide-y divide-gray-50 text-sm"></tbody>
                        </table>
                    </div>
                    <div id="loader" class="p-10 text-center text-gray-400 italic text-xs uppercase tracking-widest">Menghubungkan ke server...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- 1. PROTEKSI KEAMANAN ADMIN ---
        (function() {
            const isLoggedIn = sessionStorage.getItem('isLoggedIn');
            const userRole = sessionStorage.getItem('userRole');

            if (isLoggedIn !== 'true') {
                window.location.href = 'login.html';
            } else if (userRole !== 'admin') {
                alert("Akses Ditolak! Laman ini khusus Admin.");
                window.location.href = 'index.html';
            } else {
                document.body.style.display = "block";
            }
        })();

        // Matikan Klik Kanan
        document.addEventListener('contextmenu', e => e.preventDefault());

        // Matikan Shortcut F12, Ctrl+U, Ctrl+Shift+I
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        };

        // --- 2. LOGIKA ADMIN PANEL ---
        const API_URL = "https://script.google.com/macros/s/AKfycbx7Z5WIzD7sztiuaZj3woxst1TW0vCnQ3bddyquC4xUFmPZ9DKZqeyfewi6XSxkSJEN/exec";

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function logout() {
            if(confirm("Keluar dari Admin Panel?")) { 
                sessionStorage.clear(); 
                window.location.href = 'login.html'; 
            }
        }

        async function fetchAdmin() {
            const loader = document.getElementById('loader');
            const adminBody = document.getElementById('adminBody');
            loader.classList.remove('hidden');
            loader.innerText = "Sedang mengambil data...";
            adminBody.innerHTML = "";
            
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                loader.classList.add('hidden');
                
                if (data.length === 0) {
                    adminBody.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-gray-400">Belum ada data masuk.</td></tr>`;
                    return;
                }

                adminBody.innerHTML = data.reverse().map(item => {
                    const id = item.id || "-";
                    const status = item.status || "Menunggu";
                    const lampiran = item.lampiran || "";

                    return `
                    <tr class="hover:bg-gray-50/50 transition">
                        <td class="p-5 align-top w-48">
                            <div class="text-[10px] text-blue-600 font-bold mb-1 uppercase italic tracking-tighter">📅 ${item.waktu}</div>
                            <div class="font-bold text-gray-800 leading-tight uppercase text-xs">${item.opd}</div>
                        </td>
                        <td class="p-5 align-top">
                            <div class="font-bold text-gray-800 mb-1">${item.judul}</div>
                            <div class="text-xs text-gray-500 mb-3 bg-gray-50 p-3 rounded-lg border border-gray-100 italic">
                                "${item.issue}"
                            </div>
                            <div class="mb-4">
                                ${lampiran && lampiran !== "-" ? 
                                    `<a href="${lampiran}" target="_blank" class="inline-flex items-center px-3 py-1.5 bg-blue-600 text-white rounded-lg text-[10px] font-bold hover:bg-blue-700 transition shadow-sm uppercase active:scale-95">📂 Lampiran Dokumen</a>` : 
                                    `<span class="text-[9px] text-gray-400 italic">Tanpa lampiran</span>`
                                }
                            </div>
                            ${status === 'Selesai' ? 
                                `<div class="p-3 bg-green-50 rounded-xl border border-green-200 text-xs text-gray-700 italic">
                                    <span class="block font-bold text-green-700 text-[9px] uppercase mb-1">Jawaban Inspektorat:</span> "${item.jawaban}"
                                </div>` : 
                                `<textarea id="reply-${id}" class="w-full p-3 text-xs border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" rows="2" placeholder="Ketik tanggapan resmi..."></textarea>`
                            }
                        </td>
                        <td class="p-5 text-center align-top pt-8 w-32">
                            <span class="inline-block w-24 py-1 text-[9px] font-bold rounded-full border ${status === 'Selesai' ? 'bg-green-100 text-green-700 border-green-200' : 'bg-yellow-100 text-yellow-700 border-yellow-200'} uppercase">
                                ${status}
                            </span>
                        </td>
                        <td class="p-5 text-center align-top pt-6 w-40">
                            <div class="flex flex-col space-y-2">
                                ${status !== 'Selesai' ? 
                                    `<button onclick="kirimJawaban(${id}, this)" class="bg-blue-600 text-white py-2 rounded-lg text-[10px] font-bold hover:bg-blue-700 transition uppercase shadow-md active:scale-95">Kirim Balasan</button>` : 
                                    `<span class="text-green-600 font-bold text-[10px] py-2 bg-green-50 border border-green-10
