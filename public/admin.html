<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Admin Panel | SiCODI Inspektorat Kabupaten Malang</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="../pages/logo_kab.png">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        body { user-select: none; -webkit-user-select: none; display: none; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .profile-ring { padding: 2px; background: linear-gradient(to bottom right, #3b82f6, #1e40af); }
        .timeline-step { position: relative; padding-left: 1.5rem; margin-bottom: 0.75rem; border-left: 2px solid #e5e7eb; }
        .timeline-step::before { content: ''; position: absolute; left: -0.45rem; top: 0.25rem; width: 0.8rem; height: 0.8rem; border-radius: 50%; background: #cbd5e1; border: 2px solid #fff; }
        .timeline-active::before { background: #3b82f6; }
        .timeline-success::before { background: #10b981; }
        .timeline-error::before { background: #ef4444; }
        .preview-container { width: 100%; height: 300px; border-radius: 12px; overflow: hidden; border: 1px solid #e5e7eb; margin-top: 0.75rem; background: #f9fafb; }
        .preview-iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 overflow-hidden">
    <div class="flex h-screen overflow-hidden relative">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-[#1F2937] text-gray-300 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col shadow-2xl md:shadow-none">
            <div class="p-6 border-b border-gray-700 flex flex-col items-center">
                <img src="../pages/logo_kab.png" alt="Logo" class="w-14 mb-3 drop-shadow-md">
                <div class="text-center">
                    <h1 class="text-xl font-bold text-white tracking-tight uppercase">Admin Panel</h1>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest leading-tight text-center">Inspektorat Daerah<br>Kabupaten Malang</p>
                </div>
            </div>

            <nav class="flex-1 mt-6 px-4 space-y-2">
                <div class="bg-blue-600/10 text-blue-400 p-3 rounded-lg text-sm font-bold border-l-4 border-blue-500">🛡️ Kelola Konsultasi</div>
                <a href="index.html" class="block p-3 text-gray-400 hover:text-white text-[10px] uppercase font-bold tracking-tighter transition">← Dashboard User</a>
            </nav>

            <div class="p-6 border-t border-gray-700 flex flex-col items-center bg-gray-800/50">
                <div class="w-16 h-16 rounded-full profile-ring shadow-lg mb-3 overflow-hidden bg-gray-700 flex items-center justify-center">
                    <img src="../pages/zoga.jpg" alt="Zoga" class="w-full h-full object-cover rounded-full">
                </div>
                <p class="text-[11px] font-bold text-gray-100 uppercase text-center">Ananda Zoga Syahputra, S.Tr.I.P.</p>
                <button onclick="logout()" class="mt-4 w-full px-4 py-2 text-[10px] font-bold uppercase tracking-widest text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg hover:bg-red-500/20 transition active:scale-95">Keluar</button>
            </div>
        </aside>

        <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

        <main class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white border-b p-4 px-8 h-20 flex justify-between items-center shadow-sm sticky top-0 z-30">
                <div class="flex items-center flex-1">
                    <button onclick="toggleSidebar()" class="md:hidden mr-4 p-2 bg-gray-100 rounded-lg text-gray-600">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                    </button>
                    <div class="relative w-full max-w-md hidden md:block">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">🔍</span>
                        <input type="text" id="searchInput" onkeyup="filterData()" placeholder="Cari Nama OPD atau Judul Konsultasi..." class="block w-full pl-10 pr-3 py-2 border border-gray-200 rounded-xl bg-gray-50 text-xs focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <button onclick="fetchAdmin()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-[10px] font-bold hover:bg-blue-700 uppercase shadow-md transition active:scale-95">🔄 Refresh Data</button>
                </div>
            </header>

            <div class="p-8">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="overflow-x-auto custom-scrollbar">
                        <table class="w-full text-left min-w-[1000px]">
                            <thead class="bg-gray-50 border-b border-gray-100">
                                <tr class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">
                                    <th class="p-5">Waktu & Instansi</th>
                                    <th class="p-5">Detail Konsultasi & Alur Monitoring</th>
                                    <th class="p-5 text-center">Status</th>
                                    <th class="p-5 text-center">Tindakan</th>
                                </tr>
                            </thead>
                            <tbody id="adminBody" class="divide-y divide-gray-50 text-sm"></tbody>
                        </table>
                    </div>
                    <div id="loader" class="p-10 text-center text-gray-400 italic text-xs uppercase">Menghubungkan ke Supabase...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = "https://afaiwyfodjllolzwbhmz.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_0Jj5RTBAL3gewJvwOsvAxA_aPu370Bl"; 
        const headers = {
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`,
            "Content-Type": "application/json",
            "Prefer": "return=representation"
        };

        let rawData = [];

        (function() {
            if (sessionStorage.getItem('isLoggedIn') !== 'true' || sessionStorage.getItem('userRole') !== 'admin') {
                window.location.href = 'login.html';
            } else { document.body.style.display = "block"; }
        })();

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        async function fetchAdmin() {
            const loader = document.getElementById('loader');
            const adminBody = document.getElementById('adminBody');
            loader.classList.remove('hidden');
            
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/konsultasi?select=*&order=waktu_pengajuan.desc`, { headers: headers });
                rawData = await res.json();
                loader.classList.add('hidden');
                renderTable(rawData);
            } catch (e) { loader.innerHTML = `<span class="text-red-500 font-bold">⚠️ Gagal Memuat Database.</span>`; }
        }

        function renderTable(dataToRender) {
            const adminBody = document.getElementById('adminBody');
            if (!dataToRender || dataToRender.length === 0) {
                adminBody.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-gray-400 italic">Belum ada data masuk.</td></tr>`;
                return;
            }

            adminBody.innerHTML = dataToRender.map(item => {
                const id = item.id;
                const isTerjawab = item.jawaban && item.jawaban !== "";
                const tglAju = new Date(item.waktu_pengajuan).toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });

                const metodeTag = item.metode === "Offline" 
                    ? `<div class="mt-2"><span class="bg-purple-100 text-purple-700 px-2 py-0.5 rounded text-[9px] font-black uppercase border border-purple-200">Offline</span><br><span class="text-[9px] text-purple-600 italic">📅 ${item.tanggal_offline}</span></div>`
                    : `<div class="mt-2"><span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-[9px] font-black uppercase border border-blue-200">Online</span></div>`;

                // Handle link GDrive Bukti TL
                let previewTL = "";
                if (item.bukti_tl && item.bukti_tl.includes('drive.google.com')) {
                    const parts = item.bukti_tl.split('Link Dokumen: ');
                    const url = parts.length > 1 ? parts[1].trim() : item.bukti_tl;
                    previewTL = `<div class="preview-container"><iframe src="${url.replace('/view', '/preview')}" class="preview-iframe"></iframe></div>`;
                }

                // Handle link GDrive Lampiran Ajuan
                let previewAjuan = (item.lampiran && item.lampiran.includes('drive.google.com')) 
                    ? `<div class="preview-container"><iframe src="${item.lampiran.replace('/view', '/preview')}" class="preview-iframe"></iframe></div>` : "";

                let timelineContent = `
                    <div class="timeline-step timeline-success">
                        <p class="text-[9px] font-bold text-gray-400 uppercase">Tahap 1: Pengajuan OPD</p>
                        <div class="text-xs text-gray-700 mt-1"><p class="italic mb-2">"${item.rincian_masalah || '-'}"</p>${previewAjuan}</div>
                    </div>
                    <div class="timeline-step ${isTerjawab ? 'timeline-success' : 'timeline-active'}">
                        <p class="text-[9px] font-bold text-gray-400 uppercase">Tahap 2: Jawaban Auditor</p>
                        <p class="text-xs text-gray-700 mt-1">${isTerjawab ? `<span class="text-green-600 font-bold">Jawaban:</span> ${item.jawaban} <br><span class="text-[10px] text-gray-400">Pukul: ${item.waktu_jawaban ? new Date(item.waktu_jawaban).toLocaleString('id-ID') : '-'}</span>` : 'Menunggu respon Anda...'}</p>
                    </div>
                `;

                if(isTerjawab) {
                    let tlStatusText = "OPD belum mengirimkan bukti TL.";
                    let tlClass = "timeline-active";
                    if(item.status_tl === "Menunggu Verifikasi") {
                        tlStatusText = `<span class="text-orange-600 font-bold">Bukti Masuk:</span> ${item.bukti_tl.split('|')[0]} ${previewTL}`;
                    } else if(item.status_tl === "Tuntas") {
                        tlStatusText = `<span class="text-teal-600 font-bold">✅ Tuntas:</span> Selesai diverifikasi. <br><span class="text-[10px] text-gray-500">Catatan: ${item.catatan_admin_tl || '-'}</span> ${previewTL}`;
                        tlClass = "timeline-success";
                    }
                    timelineContent += `<div class="timeline-step ${tlClass}"><p class="text-[9px] font-bold text-gray-400 uppercase">Tahap 3: Verifikasi TL</p><div class="text-xs text-gray-700 mt-1">${tlStatusText}</div></div>`;
                }

                let verifAction = (item.status_tl === "Menunggu Verifikasi") ? `
                    <div class="mt-4 p-4 bg-orange-50 border rounded-xl">
                        <textarea id="catatan-tl-${id}" class="w-full p-3 text-xs border border-orange-200 rounded-lg outline-none mb-3" rows="2" placeholder="Tulis catatan verifikasi..."></textarea>
                        <div class="flex space-x-2">
                            <button onclick="konfirmasiVerifikasi(${id}, 'Tuntas')" class="flex-1 bg-teal-600 text-white py-2 rounded-lg text-[10px] font-bold uppercase">Terima (Tuntas)</button>
                            <button onclick="konfirmasiVerifikasi(${id}, 'Perlu Perbaikan')" class="flex-1 bg-white text-red-600 border border-red-200 py-2 rounded-lg text-[10px] font-bold uppercase">Revisi</button>
                        </div>
                    </div>` : "";

                return `<tr class="hover:bg-gray-50/50 transition border-b border-gray-100">
                    <td class="p-5 align-top w-48">
                        <div class="text-[10px] text-blue-600 font-bold mb-1 italic">📅 ${tglAju}</div>
                        <div class="font-bold text-gray-800 uppercase text-xs">${item.instansi}</div>${metodeTag}
                    </td>
                    <td class="p-5 align-top">
                        <div class="font-bold text-gray-800 mb-4">${item.judul_masalah}</div>
                        <div class="mb-4 bg-gray-50 p-4 rounded-xl border border-gray-100">${timelineContent}</div>
                        ${!isTerjawab ? `<textarea id="reply-${id}" class="w-full p-3 text-xs border border-gray-300 rounded-xl outline-none mb-2" rows="2" placeholder="Ketik jawaban resmi..."></textarea>` : ''}
                        ${verifAction}
                    </td>
                    <td class="p-5 text-center align-top pt-8 w-32">
                        <span class="inline-block w-24 py-1.5 text-[9px] font-bold rounded-full border uppercase ${item.status_tl === 'Tuntas' ? 'bg-teal-100 text-teal-700 border-teal-200' : (isTerjawab ? 'bg-green-100 text-green-700 border-green-200' : 'bg-yellow-100 text-yellow-700 border-yellow-200')}">${item.status_tl === 'Tuntas' ? 'Tuntas' : (isTerjawab ? 'Terjawab' : 'Menunggu')}</span>
                    </td>
                    <td class="p-5 text-center align-top pt-6 w-40">
                        <div class="flex flex-col space-y-2">
                            ${!isTerjawab ? `<button onclick="konfirmasiKirimJawaban(${id})" class="bg-blue-600 text-white py-2 rounded-lg text-[10px] font-bold uppercase">Kirim Jawaban</button>` : `<button onclick="batalSelesai(${id})" class="bg-orange-500 text-white py-2 rounded-lg text-[10px] font-bold uppercase">Ubah Jawaban</button>`}
                            <a href="https://wa.me/${item.nomor_hp}" target="_blank" class="bg-white border border-gray-300 text-gray-600 py-2 rounded-lg text-[10px] font-bold uppercase">WhatsApp</a>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        // --- FITUR KONFIRMASI JAWABAN ---
        function konfirmasiKirimJawaban(id) {
            const reply = document.getElementById(`reply-${id}`).value;
            if(!reply.trim()) return Swal.fire('Error', 'Tulis jawaban dulu!', 'error');

            Swal.fire({
                title: 'Kirim Jawaban?',
                text: "Jawaban yang dikirim akan langsung tampil di dashboard OPD terkait.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#2563eb',
                cancelButtonColor: '#64748b',
                confirmButtonText: 'Ya, Kirim Jawaban',
                cancelButtonText: 'Batal'
            }).then((result) => {
                if (result.isConfirmed) {
                    kirimJawaban(id, reply);
                }
            });
        }

        async function kirimJawaban(id, reply) {
            Swal.fire({ title: 'Mengirim...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/konsultasi?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: headers,
                    body: JSON.stringify({ 
                        jawaban: reply, 
                        waktu_jawaban: new Date().toISOString(), 
                        status: 'Terjawab' 
                    })
                });

                if(!res.ok) throw new Error("Gagal menyimpan");

                Swal.fire({ icon: 'success', title: 'Berhasil!', text: 'Jawaban terkirim.', timer: 1500, showConfirmButton: false });
                fetchAdmin(); 
            } catch (e) { 
                Swal.fire('Gagal', 'Pastikan Policy UPDATE di Supabase sudah aktif atau RLS sudah OFF.', 'error'); 
            }
        }

        // --- FITUR KONFIRMASI VERIFIKASI ---
        function konfirmasiVerifikasi(id, status) {
            const catatan = document.getElementById(`catatan-tl-${id}`).value;
            if(!catatan.trim()) return Swal.fire('Error', 'Catatan verifikasi wajib diisi!', 'error');

            Swal.fire({
                title: status === 'Tuntas' ? 'Terima Tindak Lanjut?' : 'Minta Perbaikan?',
                text: `Status monitoring akan diubah menjadi: ${status}`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: status === 'Tuntas' ? '#0d9488' : '#ef4444',
                cancelButtonColor: '#64748b',
                confirmButtonText: 'Ya, Proses',
                cancelButtonText: 'Batal'
            }).then((result) => {
                if (result.isConfirmed) {
                    prosesVerifikasi(id, status, catatan);
                }
            });
        }

        async function prosesVerifikasi(id, status, catatan) {
            Swal.fire({ title: 'Memproses...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/konsultasi?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: headers,
                    body: JSON.stringify({ 
                        status_tl: status, 
                        catatan_admin_tl: catatan, 
                        waktu_verifikasi: new Date().toISOString() 
                    })
                });

                if(!res.ok) throw new Error("Gagal verifikasi");

                Swal.fire({ icon: 'success', title: 'Berhasil!', text: 'Status diperbarui.', timer: 1500, showConfirmButton: false });
                fetchAdmin();
            } catch (e) { 
                Swal.fire('Error', 'Gagal memproses verifikasi.', 'error');
            }
        }

        async function batalSelesai(id) {
            Swal.fire({ title: 'Buka Kembali?', text: 'Jawaban lama akan dihapus dan status kembali ke Menunggu.', icon: 'warning', showCancelButton: true, confirmButtonColor: '#f59e0b' }).then(async (res) => {
                if(res.isConfirmed) {
                    await fetch(`${SUPABASE_URL}/rest/v1/konsultasi?id=eq.${id}`, {
                        method: 'PATCH',
                        headers: headers,
                        body: JSON.stringify({ jawaban: null, waktu_jawaban: null, status: 'Menunggu', status_tl: 'Belum TL' })
                    });
                    fetchAdmin();
                }
            });
        }

        function filterData() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = rawData.filter(item => 
                (item.instansi && item.instansi.toLowerCase().includes(query)) || 
                (item.judul_masalah && item.judul_masalah.toLowerCase().includes(query))
            );
            renderTable(filtered);
        }

        window.onload = fetchAdmin;
        function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }
    </script>
</body>
</html>
