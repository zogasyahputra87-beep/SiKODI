<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | E-Consulting</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-72 bg-gray-900 text-gray-300 flex-shrink-0 flex flex-col">
            <div class="p-8 border-b border-gray-800 text-center">
                <h1 class="text-xl font-black text-white">ADMIN PANEL</h1>
                <p class="text-[9px] text-gray-500 uppercase font-bold tracking-widest">Inspektorat Kab. Malang</p>
            </div>
            <nav class="flex-1 mt-6 px-4">
                <div class="bg-blue-600/10 text-blue-400 p-3 rounded-lg text-sm font-bold border-l-4 border-blue-500">🛡️ Kelola Konsultasi</div>
                <a href="index.html" class="block mt-4 p-3 text-gray-500 hover:text-white text-[10px] uppercase font-bold tracking-tighter transition">← Kembali ke Dashboard</a>
            </nav>

             <div class="p-6 border-t border-gray-700 text-center">
                <p class="text-[9px] text-gray-500 uppercase">Pengembang</p>
                <p class="text-xs font-bold text-gray-300 uppercase tracking-tighter">Ananda Zoga Syahputra, S.Tr.I.P.</p>
                <button onclick="logout()" class="mt-4 text-[10px] text-red-400 font-bold hover:text-red-300 uppercase tracking-widest">Keluar Sistem</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white border-b p-4 px-8 h-20 flex justify-between items-center shadow-sm">
                <h2 class="font-bold text-gray-800 uppercase tracking-wide text-sm">Moderasi Pertanyaan & Jawaban</h2>
                <button onclick="location.reload()" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-lg text-[10px] font-bold hover:bg-blue-100 uppercase transition">🔄 Refresh Data</button>
            </header>

            <div class="p-8">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b border-gray-100">
                            <tr class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">
                                <th class="p-5">Waktu & Instansi</th>
                                <th class="p-5 w-1/3">Detail Konsultasi & Jawaban</th>
                                <th class="p-5 text-center">Status</th>
                                <th class="p-5 text-center">Tindakan Admin</th>
                            </tr>
                        </thead>
                        <tbody id="adminBody" class="divide-y divide-gray-50 text-sm"></tbody>
                    </table>
                    <div id="loader" class="p-10 text-center text-gray-400 italic text-xs uppercase tracking-widest">Menghubungkan ke server...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx1CfegHxZP-ULmj_UTCXluojx1j5KFyX_1Js-T4Z4ID1q2CC0OitrlubOaRqu8zqpT/exec";

        async function fetchAdmin() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                document.getElementById('loader').classList.add('hidden');
                
                document.getElementById('adminBody').innerHTML = data.reverse().map(item => `
                    <tr class="hover:bg-gray-50/50 transition">
                        <td class="p-5 align-top">
                            <div class="text-[10px] text-blue-600 font-bold mb-1 uppercase tracking-tighter italic">📅 Tanya: ${item.waktu}</div>
                            <div class="font-bold text-gray-800">${item.opd}</div>
                        </td>
                        <td class="p-5 align-top">
                            <div class="font-bold text-gray-800 mb-1">${item.judul}</div>
                            <p class="text-xs text-gray-500 mb-4 italic leading-relaxed">"${item.kategori}"</p>
                            
                            ${item.status === 'Selesai' ? 
                                `<div class="p-3 bg-green-50 rounded-lg border border-green-100 shadow-sm">
                                    <div class="text-[9px] text-green-600 font-bold uppercase mb-1 tracking-widest">✓ Jawaban Terkirim (${item.waktu_jawaban || '-'})</div>
                                    <p class="text-xs text-gray-700 leading-relaxed font-medium">"${item.jawaban}"</p>
                                </div>` : 
                                `<textarea id="reply-${item.id}" class="w-full p-3 text-xs border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50" rows="3" placeholder="Tuliskan jawaban teknis di sini..."></textarea>`
                            }
                        </td>
                        <td class="p-5 text-center align-top pt-8">
                            <div class="flex justify-center">
                                <span class="inline-block w-24 py-1 text-[9px] font-bold rounded-full border text-center ${item.status === 'Selesai' ? 'bg-green-100 text-green-700 border-green-200' : 'bg-yellow-100 text-yellow-700 border-yellow-200'} uppercase">
                                    ${item.status}
                                </span>
                            </div>
                        </td>
                        <td class="p-5 text-center align-top pt-6">
                            <div class="flex flex-col space-y-2 max-w-[120px] mx-auto">
                                ${item.status !== 'Selesai' ? 
                                    `<button onclick="kirimJawaban(${item.id})" class="bg-blue-600 text-white py-2.5 rounded-lg text-[10px] font-bold hover:bg-blue-700 shadow-md transition uppercase">Kirim & Tutup</button>` : 
                                    `<span class="text-green-500 font-bold text-[9px] py-2 border rounded-lg bg-green-50 border-green-100 uppercase">Terselesaikan</span>`
                                }
                                <a href="https://wa.me/${item.whatsapp}" target="_blank" class="bg-white border text-gray-600 py-2 rounded-lg text-[10px] font-bold hover:bg-gray-100 transition text-center uppercase tracking-tighter">Hubungi WA</a>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                document.getElementById('loader').innerText = "Gagal memuat data. Periksa API atau Izin Sheet.";
            }
        }

        async function kirimJawaban(rowId) {
            const replyBox = document.getElementById(`reply-${rowId}`);
            if(!replyBox.value.trim()) return alert("Jawaban tidak boleh kosong!");
            if(!confirm("Kirim jawaban? Waktu pengiriman akan dicatat secara otomatis.")) return;

            try {
                const btn = event.target;
                btn.innerText = "...";
                btn.disabled = true;

                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        action: "simpan_jawaban", 
                        row: rowId, 
                        isi_jawaban: replyBox.value.trim() 
                    })
                });
                
                alert("Jawaban Berhasil Disimpan!");
                fetchAdmin();
            } catch (error) {
                alert("Gagal koneksi server.");
                fetchAdmin();
            }
        }

        window.onload = fetchAdmin;
    </script>
</body>
</html>
