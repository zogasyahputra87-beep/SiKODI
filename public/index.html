<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Consulting | Inspektorat Kab. Malang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <div class="flex h-screen overflow-hidden relative">
        
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-[#1F2937] text-gray-300 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col shadow-2xl md:shadow-none">
            <div class="p-8 border-b border-gray-700 flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-bold text-white tracking-tight">E-CONSULTING</h1>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest leading-tight">Inspektorat Daerah<br>Kabupaten Malang</p>
                </div>
                <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-white">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            
            <nav class="flex-1 mt-6 px-4 space-y-2">
                <button onclick="navigate('dashboard')" id="btn-dashboard" class="nav-item w-full flex items-center p-3 rounded-lg text-sm transition-all">
                    <span class="mr-3">📊</span> Dashboard
                </button>
                <button onclick="navigate('buat')" id="btn-buat" class="nav-item w-full flex items-center p-3 rounded-lg text-sm transition-all">
                    <span class="mr-3">➕</span> Buat Konsultasi
                </button>
                <button onclick="navigate('riwayat')" id="btn-riwayat" class="nav-item w-full flex items-center p-3 rounded-lg text-sm transition-all">
                    <span class="mr-3">📂</span> Riwayat
                </button>
            </nav>

            <div class="p-6 border-t border-gray-700">
                <div class="bg-gray-800 p-4 rounded-xl text-center">
                    <p class="text-[9px] text-gray-500 uppercase mb-1">Administrator</p>
                    <p class="text-xs font-bold text-gray-300">Ananda Zoga Syahputra</p>
                </div>
            </div>
        </aside>

        <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

        <main class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white border-b border-gray-200 p-4 flex justify-between items-center px-6 h-20 flex-shrink-0">
                <div class="flex items-center">
                    <button onclick="toggleSidebar()" class="p-2 bg-gray-100 rounded-lg text-gray-600 mr-4">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                    </button>
                    <h2 id="page-title" class="text-sm md:text-lg font-bold text-gray-800 uppercase tracking-wide">Dashboard</h2>
                </div>
                <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center border text-xl">👤</div>
            </header>

            <div id="content-area" class="p-8 max-w-6xl mx-auto w-full">
                </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
