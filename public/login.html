<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | E-Consulting Inspektorat</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#1F2937] h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden">
        <div class="p-8 text-center bg-gray-50 border-b">
            <div class="w-16 h-16 bg-gray-800 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg">
                <span class="text-white text-2xl font-bold">E</span>
            </div>
            <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tighter">SiCODI</h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Inspektorat Kabupaten Malang</p>
        </div>

        <form id="loginForm" class="p-8 space-y-5">
            <div>
                <label class="block text-[11px] font-bold text-gray-400 uppercase mb-2">Username</label>
                <input type="text" id="username" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-gray-400 transition" placeholder="Masukkan username" required>
            </div>
            <div>
                <label class="block text-[11px] font-bold text-gray-400 uppercase mb-2">Password</label>
                <input type="password" id="password" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-gray-400 transition" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="w-full bg-gray-800 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-gray-900 transition-all active:scale-95 uppercase tracking-widest text-sm">
                Masuk ke Sistem
            </button>
            
            <p id="errorMessage" class="text-red-500 text-xs text-center hidden font-bold italic">Username atau Password salah!</p>
        </form>
        
        <div class="p-6 bg-gray-50 text-center border-t">
            <p class="text-[10px] text-gray-400 uppercase font-bold tracking-tighter">Versi 1.0 - Aktualisasi CPNS</p>
        </div>
    </div>

    <script>
        // 1. DATA AKUN (Bisa Anda tambah sesuai kebutuhan)
        const accounts = [
            { user: "admin", pass: "inspektorat2026", role: "admin", target: "admin.html" },
            { user: "malangkab", pass: "malangkab123", role: "user", target: "index.html" },
            { user: "kecamatan", pass: "malang123", role: "user", target: "index.html" }
        ];

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const userIn = document.getElementById('username').value;
            const passIn = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');

            // 2. LOGIKA PENGECEKAN
            const foundAccount = accounts.find(acc => acc.user === userIn && acc.pass === passIn);

            if (foundAccount) {
                // Simpan status login di SessionStorage (hilang saat browser ditutup)
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('userRole', foundAccount.role);
                sessionStorage.setItem('userName', foundAccount.user);

                // 3. PENGALIHAN AKSES
                window.location.href = foundAccount.target;
            } else {
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
