<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Konsultasi | E-Consulting</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <div class="flex h-screen overflow-hidden relative">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-[#1F2937] text-gray-300 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col">
            <div class="p-8 border-b border-gray-700 flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-bold text-white tracking-tight">SiCODI</h1>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest leading-tight">Inspektorat Daerah<br>Kabupaten Malang</p>
                </div>
                <button onclick="toggleSidebar()" class="md:hidden text-gray-400">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            
            <nav class="flex-1 mt-6 px-4 space-y-1">
                <a href="index.html" class="w-full flex items-center p-3 rounded-lg hover:bg-gray-800 transition text-sm">
                    <span class="mr-3">📊</span> Dashboard
                </a>
                <a href="buat-konsultasi.html" class="bg-gray-700 text-white w-full flex items-center p-3 rounded-lg text-sm font-bold border-r-4 border-gray-400">
                    <span class="mr-3">➕</span> Buat Konsultasi
                </a>
                <a href="riwayat.html" class="w-full flex items-center p-3 rounded-lg hover:bg-gray-800 transition text-sm">
                    <span class="mr-3">📂</span> Riwayat Konsultasi
                </a>
            </nav>

            <div class="p-6 border-t border-gray-700 text-center">
                <p class="text-[9px] text-gray-500 uppercase">Pengembang</p>
                <p class="text-xs font-bold text-gray-300 uppercase tracking-tighter">Ananda Zoga Syahputra, S.Tr.I.P.</p>
                <button onclick="logout()" class="mt-4 w-full px-4 py-2 text-[10px] font-bold uppercase tracking-widest text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg hover:bg-red-500/20 transition active:scale-95">Keluar Sistem</button>
            </div>
        </aside>

        <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

        <main class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white border-b border-gray-200 p-4 flex justify-between items-center px-8 h-20 flex-shrink-0">
                <div class="flex items-center">
                    <button onclick="toggleSidebar()" class="md:hidden mr-4 p-2 bg-gray-100 rounded-lg text-gray-600">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                    </button>
                    <h2 class="text-lg font-bold text-gray-800 uppercase tracking-wide">Buat Konsultasi Baru</h2>
                </div>
                <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center border text-xl shadow-inner">👤</div>
            </header>

            <div class="p-8 max-w-3xl mx-auto w-full">
                <div class="bg-white p-6 md:p-10 rounded-2xl shadow-sm border border-gray-200">
                    <form id="consultForm" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-[11px] font-bold text-gray-400 uppercase mb-2">Instansi / OPD</label>
                                <input type="text" id="opdName" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 transition" placeholder="Nama Instansi / OPD" required>
                            </div>
                            <div>
                                <label class="block text-[11px] font-bold text-gray-400 uppercase mb-2">Kategori</label>
                                <select id="consultType" onchange="toggleOtherInput()" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 transition" required>
                                    <option value="">-- Pilih Kategori --</option>
                                    <option value="Pengelolaan Keuangan">Pengelolaan Keuangan</option>
                                    <option value="Administrasi Pemerintahan">Administrasi Pemerintahan</option>
                                    <option value="Pengadaan Barang/Jasa">Pengadaan Barang/Jasa</option>
                                    <option value="Lainnya">Lainnya</option>
                                </select>
                            </div>
                        </div>

                        <div id="otherTypeContainer" class="hidden">
                            <label class="block text-[11px] font-bold text-blue-600 uppercase mb-2 italic">Sebutkan Kategori Lainnya</label>
                            <input type="text" id="otherConsultType" class="w-full p-3 bg-white border border-blue-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-400 shadow-sm">
                        </div>

                        <div>
                            <label class="block text-[11px] font-bold text-gray-400 uppercase mb-2">Judul Masalah</label>
                            <input type="text" id="subject" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 transition" placeholder="Ringkasan topik" required>
                        </div>

                        <div>
                            <label class="block text-[11px] font-bold text-gray-400 uppercase mb-2">Rincian Masalah</label>
                            <textarea id="issue" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 transition" rows="4" placeholder="Jelaskan detail kendala..." required></textarea>
                        </div>

                        <div class="p-4 bg-blue-50/50 border-2 border-dashed border-blue-200 rounded-2xl">
                            <label class="block text-[10px] font-bold text-blue-600 uppercase mb-2 tracking-widest text-center">Lampiran Dokumen (Opsional)</label>
                            <input type="file" id="fileInput" class="block w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-bold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer">
                            <p class="mt-2 text-[9px] text-gray-400 text-center italic">* Maksimal 5MB (PDF/JPG/PNG)</p>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-[11px] font-bold text-gray-400 uppercase mb-2">WhatsApp</label>
                                <input type="tel" id="whatsapp" placeholder="0812xxxx" class="w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 transition" required>
                            </div>
                            <div>
                                <label class="block text-[11px] font-bold text-gray-400 uppercase mb-2">Email</label>
                                <input type="email" id="email" placeholder="contoh@malangkab.go.id" class="w-full p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 transition" required>
                            </div>
                        </div>

                        <button id="btnSubmit" type="submit" class="w-full bg-gray-800 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-gray-900 transition-all active:scale-95 uppercase tracking-widest disabled:bg-gray-400 disabled:cursor-not-allowed">
                            Kirim Pengajuan
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Cek Login
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        const API_URL = "https://script.google.com/macros/s/AKfycbz_epnri1OvLbk6dDgygs4IKtsQDC0kViYyJ5h8h7unSuoP_EFnUp0JcVTnxWZlnLbr/exec";

        function logout() {
            if(confirm("Apakah Anda yakin ingin keluar?")) {
                sessionStorage.clear();
                window.location.href = 'login.html';
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function toggleOtherInput() {
            const selectVal = document.getElementById('consultType').value;
            const container = document.getElementById('otherTypeContainer');
            container.classList.toggle('hidden', selectVal !== 'Lainnya');
        }

        // LOGIKA KIRIM DATA + FILE
        document.getElementById('consultForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const fileInput = document.getElementById('fileInput');
            
            btn.disabled = true;
            btn.innerText = "SEDANG MENGUNGGAH...";

            let fileData = { data: "", name: "", type: "" };

            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                if (file.size > 5 * 1024 * 1024) {
                    alert("File terlalu besar (Maks 5MB)");
                    btn.disabled = false;
                    btn.innerText = "KIRIM PENGAJUAN";
                    return;
                }

                fileData = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        resolve({
                            data: e.target.result.split(",")[1],
                            name: file.name,
                            type: file.type
                        });
                    };
                    reader.readAsDataURL(file);
                });
            }

            const formData = {
                action: "tambah_konsultasi",
                opd: document.getElementById('opdName').value,
                kategori: (document.getElementById('consultType').value === 'Lainnya') ? document.getElementById('otherConsultType').value : document.getElementById('consultType').value,
                judul: document.getElementById('subject').value,
                issue: document.getElementById('issue').value,
                whatsapp: document.getElementById('whatsapp').value,
                email: document.getElementById('email').value,
                fileData: fileData.data,
                fileName: fileData.name,
                fileType: fileData.type
            };

            try {
                // Gunakan fetch POST tanpa no-cors untuk mendapatkan feedback
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(formData)
                });
                
                alert('Berhasil! Data dan lampiran telah diterima Inspektorat.');
                window.location.href = "riwayat.html";
            } catch (err) {
                // Handle jika terjadi CORS error tapi data sebenarnya masuk
                alert('Data sedang dikirim. Silakan cek menu riwayat sebentar lagi.');
                window.location.href = "riwayat.html";
            }
        });
    </script>
</body>
</html>
